appId: app.verxion.native
name: Log Steps
tags:
  - quick-actions
  - write
---
- runFlow: ../auth/login.yaml

- scroll:
    direction: DOWN
    speed: SLOW

# Tap steps button (3rd quick action)
- tapOn:
    text: "Steps"
    index: 1

- waitForAnimationToEnd
- assertVisible: "Log Steps"

# Enter steps
- tapOn:
    id: "steps-input"
- inputText: "8500"

# Save
- tapOn: "Save Steps"
- waitForAnimationToEnd

# Should dismiss modal
- assertVisible: "Today"
