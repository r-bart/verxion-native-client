appId: app.verxion.native
name: Records Screen
tags:
  - progress
---
- runFlow: ../auth/login.yaml
- tapOn: "Progress"
- waitForAnimationToEnd
- tapOn: "Records"
- waitForAnimationToEnd

# Search input should be visible
- assertVisible:
    text: "Search"
    optional: true

# Records or empty state
- assertVisible:
    text: "records"
    optional: true
