<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>verxion — Dietas</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="assets/colors_and_type.css">
<style>
  :root {
    --lava: #FF6262;
    --lava-glow: rgba(255,98,98,0.55);
    --good: var(--vx-up);
    --glass-fill: rgba(255,255,255,0.06);
    --glass-stroke: rgba(255,255,255,0.12);
    --glass-hi: inset 0 1px 0 0 rgba(255,255,255,0.20), inset 0 0 0 1px rgba(255,255,255,0.05);
    --ease: cubic-bezier(0.2,0.8,0.2,1);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; min-height: 100vh; background: #050507; color: #fff;
    font-family: var(--vx-font-mono); overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  body::before {
    content: ""; position: fixed; inset: -14vh -14vw; z-index: 0;
    background:
      radial-gradient(38vw 38vw at 16% 14%, rgba(255,98,98,0.22), transparent 60%),
      radial-gradient(34vw 34vw at 84% 82%, rgba(0,210,255,0.13), transparent 62%),
      radial-gradient(30vw 30vw at 62% 104%, rgba(255,185,0,0.11), transparent 60%),
      #050507;
    filter: blur(52px);
  }

  #root { position: relative; z-index: 1; }
  .dz-fit { transform-origin: center center; }
  .dz-stage { display: flex; gap: 60px; align-items: flex-start; justify-content: center; }
  .dz-colwrap { display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .dz-coltag { display: flex; flex-direction: column; align-items: center; gap: 5px; text-align: center; }
  .dz-coltag__name { font: 700 16px/1.25 var(--vx-font-sans); letter-spacing: -0.02em; color: #fff; white-space: nowrap; }
  .dz-coltag__name b { color: var(--lava); }
  .dz-coltag__desc { font: 400 12px/1.4 var(--vx-font-mono); color: rgba(255,255,255,0.5); max-width: 36ch; }

  /* ───────── SCREEN SHELL ───────── */
  .dz-screen { position: relative; height: 100%; overflow: hidden; color: #fff; font-family: var(--vx-font-mono); }
  .dz-screen::before {
    content: ""; position: absolute; inset: 0; z-index: 0;
    background:
      radial-gradient(74% 42% at 24% -2%, rgba(255,98,98,0.24), transparent 70%),
      radial-gradient(58% 34% at 98% 14%, rgba(255,185,0,0.10), transparent 70%),
      radial-gradient(96% 50% at 50% 104%, rgba(0,210,255,0.07), transparent 76%),
      #0a0a0c;
  }
  .dz-scroll { position: absolute; inset: 0; z-index: 1; overflow-y: auto; scrollbar-width: none; padding: 0 0 30px; }
  .dz-scroll::-webkit-scrollbar { display: none; }

  /* ───────── TOP CHROME ───────── */
  .dz-chrome { position: sticky; top: 0; z-index: 6; padding: 56px 14px 10px;
    display: flex; align-items: center; gap: 10px;
    background: linear-gradient(180deg, rgba(10,10,12,0.94) 58%, rgba(10,10,12,0));
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
  .dz-chrome__btn { width: 38px; height: 38px; border-radius: 9999px; flex-shrink: 0; border: 0; cursor: pointer;
    display: flex; align-items: center; justify-content: center; color: #fff;
    background: rgba(120,120,128,0.26); border: 0.5px solid rgba(255,255,255,0.16);
    box-shadow: inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08);
    backdrop-filter: blur(12px) saturate(180%); -webkit-backdrop-filter: blur(12px) saturate(180%); }
  .dz-chrome__btn:active { opacity: 0.8; }
  .dz-chrome__title { flex: 1; text-align: center; font: 700 14px/1 var(--vx-font-sans); letter-spacing: -0.01em; color: rgba(255,255,255,0.86); }
  .dz-chrome__spacer { width: 38px; height: 38px; flex-shrink: 0; }

  /* ───────── content ───────── */
  .dz-pad { padding: 6px 16px 0; display: flex; flex-direction: column; gap: 12px; }
  .dz-lead { padding: 4px 2px 2px; }
  .dz-lead__count { font: 700 13px/1 var(--vx-font-sans); color: #fff; }
  .dz-lead__sub { font: 400 12px/1.5 var(--vx-font-mono); color: rgba(255,255,255,0.52); margin-top: 6px; }
  .dz-sec { font: 600 11px/1 var(--vx-font-mono); letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.46); padding: 8px 2px 0; }
  .dz-sec--sp { margin-top: 8px; }
  .dz-stack { display: flex; flex-direction: column; gap: 10px; }
  .dz-rows { display: flex; flex-direction: column; gap: 8px; }

  .dz-eyebrow { display: inline-flex; align-items: center; gap: 6px; font: 700 9.5px/1 var(--vx-font-mono); letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap; }
  .dz-bubble { border-radius: 9999px; display: inline-flex; align-items: center; justify-content: center;
    border: 1px solid rgba(255,255,255,0.12); box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.16); flex-shrink: 0; }
  .dz-livedot { width: 7px; height: 7px; border-radius: 9999px; background: var(--lava); box-shadow: 0 0 8px var(--lava-glow); }
  @media (prefers-reduced-motion: no-preference) { .dz-livedot { animation: dz-blink 2s var(--ease) infinite; } }
  @keyframes dz-blink { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

  .dz-score { display: inline-flex; align-items: center; gap: 4px; padding: 5px 9px; border-radius: 9999px;
    font: 700 11.5px/1 var(--vx-font-sans); letter-spacing: -0.01em; white-space: nowrap; }
  .dz-score.is-ahead { color: var(--vx-up); background: var(--vx-up-tint); border: 1px solid var(--vx-up-line); }
  .dz-score.is-on { color: var(--vx-neutral); background: var(--vx-neutral-bg); border: 1px solid rgba(255,185,0,0.28); }
  .dz-score.is-behind { color: var(--vx-health); background: var(--vx-health-bg); border: 1px solid rgba(255,71,87,0.3); }

  /* ───────── BIG CARD ───────── */
  .dz-card { display: block; width: 100%; text-align: left; cursor: pointer; padding: 16px 17px; border-radius: 20px;
    background: var(--glass-fill); border: 1px solid var(--glass-stroke); box-shadow: var(--glass-hi);
    transition: border-color .15s var(--ease), background .15s var(--ease); }
  .dz-card:hover { border-color: var(--vx-border-2); }
  .dz-card:active { opacity: 0.92; }
  .dz-card--active { background: linear-gradient(180deg, rgba(255,98,98,0.09), rgba(255,255,255,0.045)); border-color: rgba(255,98,98,0.24); }
  .dz-card__top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .dz-card__per { font: 500 10.5px/1 var(--vx-font-mono); color: rgba(255,255,255,0.46); white-space: nowrap; }
  .dz-card__row { display: flex; align-items: center; gap: 12px; margin-top: 13px; }
  .dz-card__id { flex: 1; min-width: 0; }
  .dz-card__name { font: 700 18px/1.15 var(--vx-font-sans); letter-spacing: -0.03em; color: #fff; }
  .dz-card__tags { display: flex; align-items: center; gap: 7px; margin-top: 8px; }
  .dz-tag { display: inline-flex; align-items: center; gap: 5px; padding: 4px 9px; border-radius: 9999px;
    font: 600 10px/1 var(--vx-font-mono); border: 1px solid; white-space: nowrap; }

  .dz-card__foot { margin-top: 16px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.09); }
  .dz-foot__head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 9px; }
  .dz-foot__lbl { font: 500 12px/1 var(--vx-font-mono); color: rgba(255,255,255,0.66); }
  .dz-foot__lbl b { color: #fff; font-weight: 700; }
  .dz-cells { display: flex; gap: 5px; }
  .dz-cell { flex: 1; height: 6px; border-radius: 9999px; background: rgba(255,255,255,0.1); }
  .dz-cell.is-done { background: var(--lava); }
  .dz-cell.is-now { background: var(--lava); box-shadow: 0 0 9px var(--lava-glow); }
  @media (prefers-reduced-motion: no-preference) { .dz-cell.is-now { animation: dz-pulse 2.4s var(--ease) infinite; } }
  @keyframes dz-pulse { 0%,100% { box-shadow: 0 0 5px rgba(255,98,98,0.3); } 50% { box-shadow: 0 0 13px var(--lava-glow); } }
  .dz-foot__meta { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 11px;
    font: 500 11px/1 var(--vx-font-mono); color: rgba(255,255,255,0.5); }
  .dz-foot__adh { display: inline-flex; align-items: center; gap: 4px; color: var(--vx-up); }

  /* ───────── ROW ───────── */
  .dz-row { display: flex; align-items: center; gap: 11px; width: 100%; text-align: left; cursor: pointer;
    padding: 12px 14px; border-radius: 16px; background: var(--glass-fill); border: 1px solid var(--glass-stroke);
    box-shadow: var(--glass-hi); transition: border-color .15s var(--ease); }
  .dz-row:hover { border-color: var(--vx-border-2); }
  .dz-row:active { opacity: 0.9; }
  .dz-row__body { flex: 1; min-width: 0; }
  .dz-row__name { font: 600 14px/1.2 var(--vx-font-sans); letter-spacing: -0.01em; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dz-row__meta { font: 500 11px/1.2 var(--vx-font-mono); color: rgba(255,255,255,0.5); margin-top: 4px; }
  .dz-row__done { display: inline-flex; align-items: center; gap: 4px; flex-shrink: 0; font: 700 11px/1 var(--vx-font-mono); color: var(--vx-up);
    padding: 5px 9px; border-radius: 9999px; background: var(--vx-up-tint); border: 1px solid var(--vx-up-line); }

  /* ───────── SEARCH + SORT ───────── */
  .dz-searchbar { display: flex; align-items: center; gap: 9px; padding: 11px 13px; border-radius: 14px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
  .dz-searchbar__in { flex: 1; min-width: 0; border: 0; background: transparent; outline: none; font: 500 13px/1 var(--vx-font-mono); color: #fff; }
  .dz-searchbar__in::placeholder { color: rgba(255,255,255,0.4); }
  .dz-searchbar__x { width: 22px; height: 22px; border-radius: 9999px; border: 0; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.1); }
  .dz-fbar { display: flex; gap: 8px; }
  .dz-fbtn { display: inline-flex; align-items: center; gap: 7px; cursor: pointer;
    padding: 10px 13px; border-radius: 12px; font: 600 12.5px/1 var(--vx-font-sans); letter-spacing: -0.01em; color: rgba(255,255,255,0.82);
    background: var(--glass-fill); border: 1px solid var(--glass-stroke); box-shadow: var(--glass-hi); transition: border-color .15s var(--ease); }
  .dz-fbtn svg { color: rgba(255,255,255,0.6); }
  .dz-fbtn:hover { border-color: var(--vx-border-2); }

  .dz-noresults { padding: 38px 24px; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 8px; }
  .dz-noresults__t { font: 700 15px/1 var(--vx-font-sans); color: #fff; margin-top: 4px; }
  .dz-noresults__b { font: 400 12px/1.5 var(--vx-font-mono); color: rgba(255,255,255,0.5); max-width: 26ch; }

  /* ───────── ASK AGENT ───────── */
  .dz-ask { width: 100%; display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-radius: 18px; cursor: pointer;
    margin-top: 8px; background: rgba(255,255,255,0.04); border: 1px dashed rgba(255,255,255,0.18); text-align: left;
    transition: background .15s var(--ease), border-color .15s var(--ease); }
  .dz-ask:hover { background: rgba(255,98,98,0.07); border-color: rgba(255,98,98,0.3); }
  .dz-ask:active { opacity: 0.85; }
  .dz-ask__iso { flex-shrink: 0; }
  .dz-ask__body { flex: 1; min-width: 0; }
  .dz-ask__label { font: 600 13.5px/1.25 var(--vx-font-sans); color: #fff; }
  .dz-ask__hint { font: 500 10.5px/1.45 var(--vx-font-mono); color: rgba(255,255,255,0.46); margin-top: 4px; text-wrap: pretty; }
  .dz-ask__c { font: 700 18px/1 var(--vx-font-sans); color: var(--lava); flex-shrink: 0; }

  /* ───────── SORT SHEET ───────── */
  .dz-scrim { position: absolute; inset: 0; z-index: 40; display: flex; align-items: flex-end;
    background: rgba(8,8,10,0.62); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
  @media (prefers-reduced-motion: no-preference) { .dz-scrim { animation: dz-fade .18s var(--ease); } }
  @keyframes dz-fade { from { opacity: 0; } to { opacity: 1; } }
  .dz-sheet { width: 100%; display: flex; flex-direction: column; border-radius: 26px 26px 0 0;
    background: #131316; border: 1px solid var(--glass-stroke); border-bottom: 0;
    box-shadow: 0 -16px 50px rgba(0,0,0,0.5); padding: 0 0 calc(20px + env(safe-area-inset-bottom)); overflow: hidden; }
  @media (prefers-reduced-motion: no-preference) { .dz-sheet { animation: dz-up .26s var(--ease); } }
  @keyframes dz-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .dz-sheet__grab { width: 38px; height: 4px; border-radius: 9999px; background: rgba(255,255,255,0.22); margin: 10px auto 0; flex-shrink: 0; }
  .dz-sheet__head { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px 6px; }
  .dz-sheet__title { font: 700 17px/1 var(--vx-font-sans); letter-spacing: -0.02em; color: #fff; }
  .dz-sheet__close { width: 30px; height: 30px; border-radius: 9999px; border: 0; cursor: pointer; color: rgba(255,255,255,0.7);
    display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.08); }
  .dz-sortlist { display: flex; flex-direction: column; gap: 2px; padding: 4px 16px 6px; }
  .dz-sortrow { display: flex; align-items: center; justify-content: space-between; gap: 10px; cursor: pointer; text-align: left;
    border: 0; background: transparent; padding: 13px 6px; border-radius: 12px; width: 100%; }
  .dz-sortrow:hover { background: rgba(255,255,255,0.04); }
  .dz-sortrow__l { font: 600 14px/1.2 var(--vx-font-sans); color: #fff; }
  .dz-sortrow.is-on .dz-sortrow__l { color: var(--lava); }
  .dz-sortrow__h { font: 500 11px/1.2 var(--vx-font-mono); color: rgba(255,255,255,0.46); margin-top: 4px; }
  .dz-sortrow__c { color: var(--lava); flex-shrink: 0; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="nav.jsx"></script>
  <script type="text/babel" src="comidas-data.jsx"></script>
  <script type="text/babel" src="dietas-data.jsx"></script>
  <script type="text/babel" src="dietas-core.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "orden": "recientes"
    }/*EDITMODE-END*/;

    function Phone({ tag, desc, children }) {
      return (
        <div className="dz-colwrap">
          <div className="dz-coltag">
            <div className="dz-coltag__name" dangerouslySetInnerHTML={{ __html: tag }} />
            <div className="dz-coltag__desc">{desc}</div>
          </div>
          <IOSDevice dark={true}>{children}</IOSDevice>
        </div>
      );
    }

    function App() {
      const [t, setTweak] = useTweaks({ ...TWEAK_DEFAULTS, ...vxReadParams(["orden"]) });
      return (
        <div>
          <div className="dz-fit" id="fit">
            <div className="dz-stage">
              <Phone tag="verxion · <b>Dietas</b>"
                desc="La dieta activa y el archivo de planes completados. Cada una abre su detalle. Solo lectura — crear una la hace el agente.">
                <DietasScreen t={t} key={t.orden} />
              </Phone>
            </div>
          </div>

          <TweaksPanel>
            <TweakSection label="Vista inicial" />
            <TweakSelect label="Orden" value={t.orden}
              options={[
                { value: "recientes", label: "Recientes" },
                { value: "nombre", label: "Alfabético" },
                { value: "adherencia", label: "Adherencia" },
                { value: "kcal", label: "Calorías" },
              ]}
              onChange={(v) => setTweak("orden", v)} />
          </TweaksPanel>
        </div>
      );
    }

    function fit() {
      const el = document.getElementById("fit");
      if (!el) return;
      const stage = el.querySelector(".dz-stage");
      const w = stage.scrollWidth, h = stage.scrollHeight;
      const scale = Math.min(1, (window.innerWidth - 48) / w, (window.innerHeight - 40) / h);
      el.style.transform = "scale(" + scale + ")";
    }
    window.addEventListener("resize", fit);
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    setTimeout(fit, 80);
    setTimeout(fit, 400);
  </script>
</body>
</html>
