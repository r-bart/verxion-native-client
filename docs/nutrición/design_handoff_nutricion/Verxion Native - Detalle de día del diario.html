<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>verxion — Detalle de día del diario</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="assets/colors_and_type.css">
<style>
  :root {
    --lava: #FF6262;
    --lava-glow: rgba(255,98,98,0.55);
    --good: var(--vx-up);
    --glass-fill: rgba(255,255,255,0.06);
    --glass-stroke: rgba(255,255,255,0.12);
    --glass-hi: inset 0 1px 0 0 rgba(255,255,255,0.20), inset 0 0 0 1px rgba(255,255,255,0.05);
    --ease: cubic-bezier(0.2,0.8,0.2,1);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; min-height: 100vh; background: #050507; color: #fff;
    font-family: var(--vx-font-mono); overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  body::before {
    content: ""; position: fixed; inset: -14vh -14vw; z-index: 0;
    background:
      radial-gradient(38vw 38vw at 16% 14%, rgba(255,98,98,0.22), transparent 60%),
      radial-gradient(34vw 34vw at 84% 82%, rgba(0,210,255,0.13), transparent 62%),
      radial-gradient(30vw 30vw at 62% 104%, rgba(255,185,0,0.11), transparent 60%),
      #050507;
    filter: blur(52px);
  }

  #root { position: relative; z-index: 1; }
  .dd-fit { transform-origin: center center; }
  .dd-stage { display: flex; gap: 60px; align-items: flex-start; justify-content: center; }
  .dd-colwrap { display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .dd-coltag { display: flex; flex-direction: column; align-items: center; gap: 5px; text-align: center; }
  .dd-coltag__name { font: 700 16px/1.25 var(--vx-font-sans); letter-spacing: -0.02em; color: #fff; white-space: nowrap; }
  .dd-coltag__name b { color: var(--lava); }
  .dd-coltag__desc { font: 400 12px/1.4 var(--vx-font-mono); color: rgba(255,255,255,0.5); max-width: 36ch; }

  /* ───────── SCREEN SHELL ───────── */
  .dd-screen { position: relative; height: 100%; overflow: hidden; color: #fff; font-family: var(--vx-font-mono); }
  .dd-screen::before {
    content: ""; position: absolute; inset: 0; z-index: 0;
    background:
      radial-gradient(74% 42% at 24% -2%, rgba(255,98,98,0.24), transparent 70%),
      radial-gradient(58% 34% at 98% 14%, rgba(255,185,0,0.10), transparent 70%),
      radial-gradient(96% 50% at 50% 104%, rgba(0,210,255,0.07), transparent 76%),
      #0a0a0c;
  }
  .dd-scroll { position: absolute; inset: 0; z-index: 1; overflow-y: auto; scrollbar-width: none; padding: 0 0 30px; }
  .dd-scroll::-webkit-scrollbar { display: none; }

  /* ───────── TOP CHROME ───────── */
  .dd-chrome { position: sticky; top: 0; z-index: 6; padding: 56px 14px 10px;
    display: flex; align-items: center; gap: 10px;
    background: linear-gradient(180deg, rgba(10,10,12,0.94) 58%, rgba(10,10,12,0));
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
  .dd-chrome__btn { width: 38px; height: 38px; border-radius: 9999px; flex-shrink: 0; border: 0; cursor: pointer;
    display: flex; align-items: center; justify-content: center; color: #fff;
    background: rgba(120,120,128,0.26); border: 0.5px solid rgba(255,255,255,0.16);
    box-shadow: inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08);
    backdrop-filter: blur(12px) saturate(180%); -webkit-backdrop-filter: blur(12px) saturate(180%); }
  .dd-chrome__btn:active { opacity: 0.8; }
  .dd-chrome__title { flex: 1; text-align: center; font: 700 14px/1 var(--vx-font-sans); letter-spacing: -0.01em; color: rgba(255,255,255,0.86); }

  /* ───────── content ───────── */
  .dd-pad { padding: 6px 16px 0; display: flex; flex-direction: column; gap: 14px; }
  .dd-sec { display: flex; align-items: center; gap: 8px; padding: 8px 2px 0; }
  .dd-sec__ic { color: rgba(255,255,255,0.5); display: inline-flex; }
  .dd-sec__k { font: 700 10.5px/1 var(--vx-font-mono); letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.56); white-space: nowrap; }
  .dd-sec__count { font: 500 10px/1 var(--vx-font-mono); color: rgba(255,255,255,0.4); white-space: nowrap; }
  .dd-sec__line { flex: 1; height: 1px; background: rgba(255,255,255,0.07); }

  .dd-eyebrow { display: inline-flex; align-items: center; gap: 5px; font: 700 9.5px/1 var(--vx-font-mono); letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap; }
  .dd-bubble { border-radius: 9999px; display: inline-flex; align-items: center; justify-content: center;
    border: 1px solid rgba(255,255,255,0.12); box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.16); flex-shrink: 0; }

  /* ───────── HERO ───────── */
  .dd-hero { padding: 18px; border-radius: 24px;
    background: linear-gradient(180deg, rgba(255,255,255,0.075), rgba(255,255,255,0.035));
    border: 1px solid var(--glass-stroke); box-shadow: var(--glass-hi), 0 14px 38px rgba(0,0,0,0.32); }
  .dd-hero__top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .dd-hero__ctx { display: inline-flex; align-items: center; gap: 5px; font: 500 10.5px/1 var(--vx-font-mono); color: rgba(255,255,255,0.46); white-space: nowrap; }
  .dd-hero__ctx svg { color: rgba(255,255,255,0.4); }
  .dd-hero__row { display: flex; align-items: center; gap: 13px; margin-top: 14px; }
  .dd-hero__date { font: 700 24px/1.05 var(--vx-font-sans); letter-spacing: -0.035em; color: #fff; }
  .dd-hero__sub { font: 500 12px/1.3 var(--vx-font-mono); color: rgba(255,255,255,0.56); margin-top: 5px; }
  .dd-hero__class { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; margin-top: 16px; }
  .dd-class { display: inline-flex; align-items: center; gap: 5px; font: 700 10px/1 var(--vx-font-mono); letter-spacing: 0.03em;
    padding: 5px 9px; border-radius: 9999px; border: 1px solid; }
  .dd-class__meta { font: 500 11px/1 var(--vx-font-mono); color: rgba(255,255,255,0.5); }
  .dd-prtag { display: inline-flex; align-items: center; gap: 4px; margin-left: auto; font: 700 10px/1 var(--vx-font-mono);
    color: var(--vx-neutral); padding: 5px 8px; border-radius: 9999px; background: var(--vx-neutral-bg); border: 1px solid rgba(255,185,0,0.3); }

  /* ───────── AGENT RECAP ───────── */
  .dd-recap { display: flex; gap: 12px; align-items: flex-start; padding: 14px 16px; border-radius: 18px;
    background: rgba(255,98,98,0.09); backdrop-filter: blur(20px) saturate(150%); -webkit-backdrop-filter: blur(20px) saturate(150%);
    border: 1px solid rgba(255,98,98,0.2); box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.07); }
  .dd-recap__mark { flex-shrink: 0; margin-top: 1px; }
  .dd-recap__from { font: 700 10.5px/1 var(--vx-font-sans); color: var(--lava); margin-bottom: 5px; }
  .dd-recap__msg { font: 400 12.5px/1.5 var(--vx-font-mono); color: rgba(255,255,255,0.9); text-wrap: pretty; }

  /* ───────── CONSUMIDO (anillo segmentado + barras) ───────── */
  .dd-intake { padding: 17px 18px; border-radius: 22px;
    background: linear-gradient(180deg, rgba(255,98,98,0.10), rgba(255,255,255,0.05));
    border: 1px solid rgba(255,98,98,0.24); box-shadow: var(--glass-hi); }
  .dd-intake__top { display: flex; align-items: center; gap: 18px; }
  .dd-intake__ring { position: relative; flex-shrink: 0; }
  .dd-intake__ringc { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; }
  .dd-intake__num { font: 700 24px/1 var(--vx-font-sans); letter-spacing: -0.04em; color: #fff; }
  .dd-intake__den { font: 500 11px/1 var(--vx-font-mono); color: rgba(255,255,255,0.45); margin-top: 2px; }
  .dd-intake__side { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 8px; }
  .dd-intake__lbl { font: 700 9.5px/1 var(--vx-font-mono); letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.5); }
  .dd-intake__tag { align-self: flex-start; font: 600 11px/1 var(--vx-font-mono); padding: 5px 10px; border-radius: 9999px; }
  .dd-intake__tag.is-on { color: var(--good); background: var(--vx-up-tint); border: 1px solid var(--vx-up-line); }
  .dd-intake__tag.is-low { color: var(--vx-body); background: var(--vx-body-bg); border: 1px solid rgba(0,210,255,0.26); }
  .dd-intake__tag.is-over { color: var(--vx-neutral); background: var(--vx-neutral-bg); border: 1px solid rgba(255,185,0,0.3); }
  .dd-intake__obj { font: 500 11px/1.3 var(--vx-font-mono); color: rgba(255,255,255,0.5); }

  /* ───────── MACROS (barras dentro de intake) ───────── */
  .dd-macros { display: flex; flex-direction: column; gap: 11px; margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.12); }
  .dd-macro__head { display: flex; justify-content: space-between; font: 500 12px/1 var(--vx-font-mono); color: rgba(255,255,255,0.82); margin-bottom: 7px; }
  .dd-macro__head em { font-style: normal; color: rgba(255,255,255,0.42); white-space: nowrap; }
  .dd-bar { height: 6px; border-radius: 9999px; background: rgba(255,255,255,0.1); overflow: hidden; }
  .dd-bar__fill { height: 100%; border-radius: 9999px; box-shadow: 0 0 9px currentColor; }

  /* ───────── TILES ───────── */
  .dd-tiles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .dd-tile { padding: 13px 12px; border-radius: 16px; background: var(--glass-fill); border: 1px solid var(--glass-stroke);
    box-shadow: var(--glass-hi); display: flex; flex-direction: column; gap: 8px; }
  .dd-tile__bubble { width: 30px; height: 30px; border-radius: 9999px; display: flex; align-items: center; justify-content: center;
    border: 1px solid rgba(255,255,255,0.1); }
  .dd-tile__v { font: 700 19px/1 var(--vx-font-sans); letter-spacing: -0.03em; color: #fff; }
  .dd-tile__v em { font-style: normal; font-size: 11px; color: rgba(255,255,255,0.5); font-weight: 600; margin-left: 1px; }
  .dd-tile__l { font: 500 9.5px/1 var(--vx-font-mono); letter-spacing: 0.03em; text-transform: uppercase; color: rgba(255,255,255,0.46); }

  /* ───────── MEAL BREAKDOWN ───────── */
  .dd-meallist { display: flex; flex-direction: column; gap: 9px; }
  .dd-meal { display: block; width: 100%; text-align: left; cursor: pointer; padding: 13px 14px; border-radius: 16px;
    background: var(--glass-fill); border: 1px solid var(--glass-stroke); box-shadow: var(--glass-hi);
    transition: border-color .15s var(--ease); }
  .dd-meal:hover { border-color: var(--vx-border-2); }
  .dd-meal:active { opacity: 0.9; }
  .dd-meal.is-key { border-color: rgba(255,98,98,0.26); }
  .dd-meal.is-swap { border-color: rgba(0,210,255,0.24); }
  .dd-meal__head { display: flex; align-items: center; gap: 11px; }
  .dd-meal__name { font: 600 14.5px/1.2 var(--vx-font-sans); letter-spacing: -0.01em; color: #fff; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
  .dd-meal__keytag { font: 700 8px/1 var(--vx-font-mono); letter-spacing: 0.06em; text-transform: uppercase; color: var(--vx-lava);
    padding: 3px 6px; border-radius: 9999px; background: var(--vx-lava-bg); border: 1px solid rgba(255,98,98,0.3); }
  .dd-meal__time { font: 500 10.5px/1.3 var(--vx-font-mono); color: rgba(255,255,255,0.5); margin-top: 5px; }
  .dd-meal__kcal { flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; }
  .dd-meal__kcal span { font: 700 16px/1 var(--vx-font-sans); letter-spacing: -0.03em; color: #fff; }
  .dd-meal__kcal em { font-style: normal; font: 500 9px/1 var(--vx-font-mono); color: rgba(255,255,255,0.45); margin-top: 3px; }
  .dd-meal__macros { display: flex; align-items: center; gap: 14px; margin-top: 11px; }
  .dd-mq { font: 600 12px/1 var(--vx-font-mono); }
  .dd-mq b { font-weight: 700; }
  .dd-meal__swap { display: flex; align-items: center; gap: 6px; margin-top: 10px; padding: 8px 10px; border-radius: 10px;
    font: 500 10.5px/1.4 var(--vx-font-mono); color: var(--vx-body); background: rgba(0,210,255,0.08); border: 1px solid rgba(0,210,255,0.18); text-wrap: pretty; }
  .dd-meal__swap svg { flex-shrink: 0; }

  /* ───────── SUPPS ───────── */
  .dd-supps { display: flex; flex-direction: column; gap: 8px; }
  .dd-supp { display: flex; align-items: center; gap: 11px; padding: 11px 13px; border-radius: 14px;
    background: var(--glass-fill); border: 1px solid var(--glass-stroke); box-shadow: var(--glass-hi); }
  .dd-supp__body { flex: 1; min-width: 0; }
  .dd-supp__name { font: 600 13px/1.2 var(--vx-font-sans); color: #fff; }
  .dd-supp__time { font: 500 10.5px/1 var(--vx-font-mono); color: rgba(255,255,255,0.46); margin-top: 4px; }
  .dd-supp__tag { display: inline-flex; align-items: center; gap: 4px; font: 700 9px/1 var(--vx-font-mono); letter-spacing: 0.06em;
    color: var(--vx-insight); padding: 4px 8px; border-radius: 9999px; background: var(--vx-insight-bg); border: 1px solid rgba(155,89,182,0.3); }

  /* ───────── USER NOTE ───────── */
  .dd-usernote { padding: 13px 15px; border-radius: 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.09); }
  .dd-usernote__k { font: 700 9.5px/1 var(--vx-font-mono); letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.42); margin-bottom: 7px; }
  .dd-usernote__t { font: 400 12.5px/1.5 var(--vx-font-mono); color: rgba(255,255,255,0.82); font-style: italic; text-wrap: pretty; }

  /* ───────── ASK AGENT ───────── */
  .dd-ask { width: 100%; display: flex; align-items: center; gap: 12px; padding: 13px 15px; border-radius: 16px; cursor: pointer;
    margin-top: 6px; background: rgba(255,255,255,0.04); border: 1px dashed rgba(255,255,255,0.18); text-align: left;
    transition: background .15s var(--ease), border-color .15s var(--ease); }
  .dd-ask:hover { background: rgba(255,98,98,0.07); border-color: rgba(255,98,98,0.3); }
  .dd-ask:active { opacity: 0.85; }
  .dd-ask__iso { flex-shrink: 0; }
  .dd-ask__body { flex: 1; min-width: 0; }
  .dd-ask__label { font: 600 13px/1.25 var(--vx-font-sans); color: #fff; }
  .dd-ask__hint { font: 500 10.5px/1.45 var(--vx-font-mono); color: rgba(255,255,255,0.46); margin-top: 4px; text-wrap: pretty; }
  .dd-ask__c { font: 700 18px/1 var(--vx-font-sans); color: var(--lava); flex-shrink: 0; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="nav.jsx"></script>
  <script type="text/babel" src="comidas-data.jsx"></script>
  <script type="text/babel" src="dia-diario-core.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "dia": "d-28may"
    }/*EDITMODE-END*/;

    function Phone({ tag, desc, children }) {
      return (
        <div className="dd-colwrap">
          <div className="dd-coltag">
            <div className="dd-coltag__name" dangerouslySetInnerHTML={{ __html: tag }} />
            <div className="dd-coltag__desc">{desc}</div>
          </div>
          <IOSDevice dark={true}>{children}</IOSDevice>
        </div>
      );
    }

    function App() {
      const [t, setTweak] = useTweaks({ ...TWEAK_DEFAULTS, ...vxReadParams(["dia"]) });
      return (
        <div>
          <div className="dd-fit" id="fit">
            <div className="dd-stage">
              <Phone tag="verxion · <b>Detalle de día del diario</b>"
                desc="El informe persistido de un día de dieta cerrado, reabierto desde el Diario: kcal y macros reales, adherencia, el desglose por comida y el informe del agente. Solo lectura.">
                <DiaDiarioScreen t={t} />
              </Phone>
            </div>
          </div>

          <TweaksPanel>
            <TweakSection label="Día del diario" />
            <TweakSelect label="Registro" value={t.dia}
              options={[
                { value: "d-1jun", label: "Lun 1 jun · clavado" },
                { value: "d-31may", label: "Dom 31 · en objetivo" },
                { value: "d-30may", label: "Sáb 30 · día alto" },
                { value: "d-29may", label: "Vie 29 · clavado" },
                { value: "d-28may", label: "Jue 28 · por debajo" },
                { value: "d-27may", label: "Mié 27 · en objetivo" },
                { value: "d-26may", label: "Mar 26 · sólido" },
              ]}
              onChange={(v) => setTweak("dia", v)} />
          </TweaksPanel>
        </div>
      );
    }

    function fit() {
      const el = document.getElementById("fit");
      if (!el) return;
      const stage = el.querySelector(".dd-stage");
      const w = stage.scrollWidth, h = stage.scrollHeight;
      const scale = Math.min(1, (window.innerWidth - 48) / w, (window.innerHeight - 40) / h);
      el.style.transform = "scale(" + scale + ")";
    }
    window.addEventListener("resize", fit);
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    setTimeout(fit, 80);
    setTimeout(fit, 400);
  </script>
</body>
</html>
