<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>verxion — Plan de comidas del día</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="assets/colors_and_type.css">
<style>
  :root {
    --lava: #FF6262;
    --lava-glow: rgba(255,98,98,0.55);
    --good: var(--vx-up);
    --glass-fill: rgba(255,255,255,0.06);
    --glass-stroke: rgba(255,255,255,0.12);
    --glass-hi: inset 0 1px 0 0 rgba(255,255,255,0.20), inset 0 0 0 1px rgba(255,255,255,0.05);
    --ease: cubic-bezier(0.2,0.8,0.2,1);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; min-height: 100vh; background: #050507; color: #fff;
    font-family: var(--vx-font-mono); overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  body::before {
    content: ""; position: fixed; inset: -14vh -14vw; z-index: 0;
    background:
      radial-gradient(38vw 38vw at 16% 14%, rgba(255,98,98,0.22), transparent 60%),
      radial-gradient(34vw 34vw at 84% 84%, rgba(0,210,255,0.12), transparent 62%),
      radial-gradient(30vw 30vw at 60% 104%, rgba(255,185,0,0.13), transparent 60%),
      #050507;
    filter: blur(52px);
  }

  /* stage / scaling */
  #root { position: relative; z-index: 1; }
  .c-fit { transform-origin: center center; }
  .c-stage { display: flex; gap: 60px; align-items: flex-start; justify-content: center; }
  .c-col { display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .c-coltag { display: flex; flex-direction: column; align-items: center; gap: 5px; text-align: center; }
  .c-coltag__name { font: 700 16px/1.25 var(--vx-font-sans); letter-spacing: -0.02em; color: #fff; white-space: nowrap; }
  .c-coltag__name b { color: var(--lava); }
  .c-coltag__desc { font: 400 12px/1.4 var(--vx-font-mono); color: rgba(255,255,255,0.5); max-width: 36ch; }

  /* ───────── SCREEN SHELL ───────── */
  .c-screen { position: relative; height: 100%; overflow: hidden; color: #fff; font-family: var(--vx-font-mono); }
  .c-screen::before {
    content: ""; position: absolute; inset: 0; z-index: 0;
    background:
      radial-gradient(74% 42% at 24% -2%, rgba(255,98,98,0.28), transparent 70%),
      radial-gradient(58% 34% at 98% 14%, rgba(255,185,0,0.13), transparent 70%),
      radial-gradient(96% 50% at 50% 104%, rgba(0,210,255,0.06), transparent 76%),
      #0a0a0c;
  }
  .c-scroll { position: absolute; inset: 0; z-index: 1; overflow-y: auto; scrollbar-width: none; padding: 0 0 126px; }
  .c-scroll::-webkit-scrollbar { display: none; }

  /* ───────── TOP CHROME (sticky) ───────── */
  .c-chrome { position: sticky; top: 0; z-index: 6; padding: 56px 14px 10px; display: flex; align-items: center; gap: 10px;
    background: linear-gradient(180deg, rgba(10,10,12,0.94) 58%, rgba(10,10,12,0));
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
  .c-chrome__btn { width: 38px; height: 38px; border-radius: 9999px; flex-shrink: 0; border: 0; cursor: pointer;
    display: flex; align-items: center; justify-content: center; color: #fff;
    background: rgba(120,120,128,0.26); border: 0.5px solid rgba(255,255,255,0.16);
    box-shadow: inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08);
    backdrop-filter: blur(12px) saturate(180%); -webkit-backdrop-filter: blur(12px) saturate(180%); }
  .c-chrome__btn:active { opacity: 0.8; }
  .c-chrome__title { flex: 1; text-align: center; font: 700 13px/1 var(--vx-font-sans); letter-spacing: -0.01em; color: rgba(255,255,255,0.82); }

  .c-pad { padding: 6px 16px 0; display: flex; flex-direction: column; gap: 14px; }
  .c-section { display: flex; align-items: center; gap: 8px; padding: 8px 2px 0; }
  .c-section__k { font: 700 10.5px/1 var(--vx-font-mono); letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.46); }
  .c-section__count { font: 600 10.5px/1 var(--vx-font-mono); color: rgba(255,255,255,0.34); }
  .c-section__line { flex: 1; height: 1px; background: rgba(255,255,255,0.07); }
  .c-eyebrow { font: 700 10px/1 var(--vx-font-mono); letter-spacing: 0.13em; text-transform: uppercase; }

  .c-bubble { border-radius: 9999px; display: inline-flex; align-items: center; justify-content: center;
    border: 1px solid rgba(255,255,255,0.12); box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.16); flex-shrink: 0; }

  /* ───────── HERO ───────── */
  .c-hero { padding: 18px; border-radius: 24px; background: var(--glass-fill);
    backdrop-filter: blur(30px) saturate(150%); -webkit-backdrop-filter: blur(30px) saturate(150%);
    border: 1px solid var(--glass-stroke); box-shadow: var(--glass-hi), 0 14px 38px rgba(0,0,0,0.32); }
  .c-hero__top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .c-hero__ctx { display: inline-flex; align-items: center; gap: 5px; font: 500 10.5px/1 var(--vx-font-mono); color: rgba(255,255,255,0.46); white-space: nowrap; }
  .c-hero__ctx svg { color: rgba(255,255,255,0.4); }
  .c-hero__row { display: flex; align-items: center; gap: 13px; margin-top: 14px; }
  .c-hero__name { font: 700 25px/1.05 var(--vx-font-sans); letter-spacing: -0.035em; color: #fff; }
  .c-hero__focus { font: 500 12.5px/1.3 var(--vx-font-mono); color: rgba(255,255,255,0.6); margin-top: 5px; }
  .c-hero__stats { display: flex; margin-top: 18px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.09); }
  .c-stat { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
  .c-stat + .c-stat::before { content: ""; position: absolute; left: 0; top: 2px; bottom: 2px; width: 1px; background: rgba(255,255,255,0.08); }
  .c-stat svg { color: rgba(255,255,255,0.4); }
  .c-stat b { font: 700 17px/1 var(--vx-font-sans); letter-spacing: -0.03em; color: #fff; margin-top: 2px; }
  .c-stat span { font: 500 9px/1 var(--vx-font-mono); letter-spacing: 0.03em; text-transform: uppercase; color: rgba(255,255,255,0.46); }

  /* ───────── AGENT NOTE ───────── */
  .c-agent { display: flex; gap: 12px; align-items: flex-start; padding: 14px 16px; border-radius: 18px;
    background: rgba(255,98,98,0.09); backdrop-filter: blur(20px) saturate(150%); -webkit-backdrop-filter: blur(20px) saturate(150%);
    border: 1px solid rgba(255,98,98,0.2); box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.07); }
  .c-agent__mark { flex-shrink: 0; margin-top: 1px; }
  .c-agent__from { font: 700 10.5px/1 var(--vx-font-sans); color: var(--lava); margin-bottom: 5px; }
  .c-agent__msg { font: 400 12.5px/1.5 var(--vx-font-mono); color: rgba(255,255,255,0.9); text-wrap: pretty; }

  /* ───────── MEAL CARD ───────── */
  .c-list { display: flex; flex-direction: column; gap: 9px; }
  .c-meal { padding: 15px; border-radius: 18px; background: var(--glass-fill);
    border: 1px solid var(--glass-stroke); box-shadow: var(--glass-hi); }
  .c-meal.is-key { background: linear-gradient(180deg, rgba(255,98,98,0.08), rgba(255,255,255,0.05)); border-color: rgba(255,98,98,0.26); }
  .c-meal.is-swap { border-color: rgba(0,210,255,0.3); }
  .c-meal__head { display: flex; align-items: center; gap: 12px; }
  .c-meal__name { font: 600 15.5px/1.2 var(--vx-font-sans); letter-spacing: -0.01em; color: #fff; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
  .c-meal__keytag { font: 700 8px/1 var(--vx-font-mono); letter-spacing: 0.07em; text-transform: uppercase; color: var(--lava);
    padding: 3px 6px; border-radius: 9999px; background: var(--vx-lava-bg); border: 1px solid rgba(255,98,98,0.3); }
  .c-meal__time { display: inline-flex; align-items: center; gap: 5px; font: 500 11px/1 var(--vx-font-mono); color: rgba(255,255,255,0.5); margin-top: 5px; }
  .c-meal__time svg { color: rgba(255,255,255,0.4); }
  .c-meal__kcal { text-align: right; flex-shrink: 0; }
  .c-meal__kcal span { display: block; font: 700 17px/1 var(--vx-font-sans); letter-spacing: -0.02em; color: #fff; }
  .c-meal__kcal em { font-style: normal; font: 500 8.5px/1 var(--vx-font-mono); letter-spacing: 0.06em; text-transform: uppercase; color: rgba(255,255,255,0.4); }
  .c-meal__macros { display: flex; gap: 7px; margin-top: 12px; }
  .c-mq { display: inline-flex; align-items: baseline; gap: 2px; font: 600 11px/1 var(--vx-font-mono);
    padding: 6px 10px; border-radius: 9999px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
  .c-mq b { font: 700 13px/1 var(--vx-font-sans); letter-spacing: -0.02em; }
  .c-meal__swap { margin-top: 11px; display: flex; align-items: flex-start; gap: 6px; font: 500 10.5px/1.4 var(--vx-font-mono);
    color: var(--vx-body); padding: 8px 10px; border-radius: 10px; background: rgba(0,210,255,0.08); border: 1px solid rgba(0,210,255,0.18); text-wrap: pretty; }
  .c-meal__swap svg { flex-shrink: 0; margin-top: 1px; }
  .c-meal__swap b { color: rgba(255,255,255,0.72); font-weight: 600; }
  .c-meal__foods { display: flex; flex-direction: column; margin-top: 13px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.09); }
  .c-food { display: flex; align-items: center; gap: 9px; padding: 6px 0; }
  .c-food__dot { width: 7px; height: 7px; border-radius: 9999px; flex-shrink: 0; box-shadow: 0 0 6px currentColor; }
  .c-food__name { font: 500 12.5px/1.2 var(--vx-font-sans); color: rgba(255,255,255,0.88); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .c-food__qty { font: 500 11px/1 var(--vx-font-mono); color: rgba(255,255,255,0.5); margin-left: 6px; flex-shrink: 0; }
  .c-food__kcal { font: 500 11px/1 var(--vx-font-mono); color: rgba(255,255,255,0.4); margin-left: auto; flex-shrink: 0; }
  .c-meal__recipe { width: 100%; margin-top: 12px; display: flex; align-items: center; gap: 8px; cursor: pointer; text-align: left;
    padding: 9px 12px; border-radius: 11px; background: rgba(255,98,98,0.07); border: 1px solid rgba(255,98,98,0.22);
    color: var(--lava); font: 600 11.5px/1 var(--vx-font-sans); letter-spacing: -0.01em; transition: background .15s var(--ease), border-color .15s var(--ease); }
  .c-meal__recipe:hover { background: rgba(255,98,98,0.12); border-color: rgba(255,98,98,0.4); }
  .c-meal__recipe span:first-of-type { flex: 1; }
  .c-meal__recipe__c { font: 700 16px/1 var(--vx-font-sans); flex-shrink: 0; }

  /* ───────── SUPPLEMENTS ───────── */
  .c-supps { display: flex; flex-direction: column; gap: 8px; }
  .c-supp { display: flex; align-items: center; gap: 11px; padding: 11px 14px; border-radius: 16px;
    background: var(--glass-fill); border: 1px solid var(--glass-stroke); box-shadow: var(--glass-hi); }
  .c-supp__body { flex: 1; min-width: 0; }
  .c-supp__name { font: 600 13.5px/1.2 var(--vx-font-sans); color: #fff; }
  .c-supp__time { font: 500 11px/1 var(--vx-font-mono); color: rgba(255,255,255,0.5); margin-top: 4px; }
  .c-supp__tag { font: 700 8.5px/1 var(--vx-font-mono); letter-spacing: 0.1em; color: var(--vx-insight);
    padding: 4px 8px; border-radius: 9999px; background: var(--vx-insight-bg); border: 1px solid rgba(155,89,182,0.3); flex-shrink: 0; }

  /* ───────── AGENT EDIT ───────── */
  .c-edit { width: 100%; display: flex; align-items: center; gap: 12px; padding: 13px 15px; border-radius: 16px; cursor: pointer;
    background: rgba(255,255,255,0.04); border: 1px dashed rgba(255,255,255,0.18); text-align: left;
    transition: background .15s var(--ease), border-color .15s var(--ease); }
  .c-edit:hover { background: rgba(255,98,98,0.07); border-color: rgba(255,98,98,0.3); }
  .c-edit:active { opacity: 0.85; }
  .c-edit__iso { flex-shrink: 0; }
  .c-edit__body { flex: 1; min-width: 0; }
  .c-edit__label { font: 600 13px/1.2 var(--vx-font-sans); color: #fff; }
  .c-edit__hint { font: 500 10.5px/1.3 var(--vx-font-mono); color: rgba(255,255,255,0.46); margin-top: 4px; }
  .c-edit__c { font: 700 18px/1 var(--vx-font-sans); color: var(--lava); flex-shrink: 0; }

  /* ───────── STICKY TOTALS BAR ───────── */
  .c-bar { position: absolute; left: 0; right: 0; bottom: 0; z-index: 7; padding: 16px 16px 28px;
    background: linear-gradient(180deg, rgba(10,10,12,0) 0%, rgba(10,10,12,0.94) 34%); }
  .c-bar__card { display: flex; align-items: center; gap: 14px; padding: 12px 16px; border-radius: 18px;
    background: rgba(28,28,30,0.82); backdrop-filter: blur(24px) saturate(160%); -webkit-backdrop-filter: blur(24px) saturate(160%);
    border: 1px solid rgba(255,255,255,0.12); box-shadow: 0 8px 28px rgba(0,0,0,0.45), inset 0 1px 0 0 rgba(255,255,255,0.08); }
  .c-bar__kcal { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
  .c-bar__kcal b { font: 700 19px/1 var(--vx-font-sans); letter-spacing: -0.03em; color: #fff; }
  .c-bar__kcal span { font: 500 9px/1 var(--vx-font-mono); letter-spacing: 0.05em; text-transform: uppercase; color: rgba(255,255,255,0.45); }
  .c-bar__macros { display: flex; gap: 14px; margin-left: auto; }
  .c-bar__m { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
  .c-bar__m b { font: 700 14px/1 var(--vx-font-sans); letter-spacing: -0.02em; }
  .c-bar__m span { font: 600 8.5px/1 var(--vx-font-mono); letter-spacing: 0.04em; color: rgba(255,255,255,0.4); }
  .c-bar__sync { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 9px;
    font: 500 10px/1 var(--vx-font-mono); color: rgba(255,255,255,0.42); }
  .c-bar__dot { width: 5px; height: 5px; border-radius: 9999px; background: var(--lava); box-shadow: 0 0 6px var(--lava-glow); }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="nav.jsx"></script>
  <script type="text/babel" src="comidas-data.jsx"></script>
  <script type="text/babel" src="plan-comidas-core.jsx"></script>

  <script type="text/babel">
    function PlanComidasScreen({ t }) {
      const model = buildPlanComidas(t);
      const { meals, supps, ajuste, tot } = model;
      const swapIdx = ajuste ? meals.findIndex((m) => m.swap) : -1;

      return (
        <div className="c-screen">
          <div className="c-scroll">
            <div className="c-chrome">
              <button className="c-chrome__btn" aria-label="Volver" onClick={() => vxNav(VX.NUTRICION, { segment: "plan" })}><Icon.chevronLeft size={20} /></button>
              <div className="c-chrome__title">Comidas de hoy</div>
              <button className="c-chrome__btn" aria-label="Más"><CIcon.more size={20} /></button>
            </div>

            <div className="c-pad">
              <CHero model={model} />

              <div className="c-section">
                <span className="c-section__k">El plan</span>
                <span className="c-section__count">{meals.length} comidas · en orden</span>
                <span className="c-section__line" />
              </div>
              <div className="c-list">
                {meals.map((m, i) => (
                  <CMealCard key={m.id} meal={m} idx={i + 1} swapped={i === swapIdx ? m.swap : null} />
                ))}
              </div>

              <div className="c-section">
                <span className="c-section__k">Suplementos</span>
                <span className="c-section__count">{supps.length} tomas</span>
                <span className="c-section__line" />
              </div>
              <CSupps supps={supps} />

              <CAgentEdit />
            </div>
          </div>

          <div className="c-bar">
            <div className="c-bar__card">
              <div className="c-bar__kcal">
                <b>{vxKcal(tot.kcal)}</b>
                <span>kcal · plan de hoy</span>
              </div>
              <div className="c-bar__macros">
                <div className="c-bar__m"><b style={{ color: "var(--vx-lava)" }}>{Math.round(tot.p)}</b><span>PROT</span></div>
                <div className="c-bar__m"><b style={{ color: "var(--vx-body)" }}>{Math.round(tot.c)}</b><span>CARB</span></div>
                <div className="c-bar__m"><b style={{ color: "var(--vx-neutral)" }}>{Math.round(tot.f)}</b><span>GRASA</span></div>
              </div>
            </div>
            <div className="c-bar__sync"><span className="c-bar__dot" /> verxion lleva la cuenta de tus macros</div>
          </div>
        </div>
      );
    }

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "ajuste": true
    }/*EDITMODE-END*/;

    function Phone({ tag, desc, children }) {
      return (
        <div className="c-col">
          <div className="c-coltag">
            <div className="c-coltag__name" dangerouslySetInnerHTML={{ __html: tag }} />
            <div className="c-coltag__desc">{desc}</div>
          </div>
          <IOSDevice dark={true}>{children}</IOSDevice>
        </div>
      );
    }

    function App() {
      const [t, setTweak] = useTweaks({ ...TWEAK_DEFAULTS, ...vxReadParams(["ajuste"]) });
      return (
        <div>
          <div className="c-fit" id="fit">
            <div className="c-stage">
              <Phone tag="verxion · <b>Plan de comidas del día</b>"
                desc="Lo que toca comer hoy, comida a comida — el plan que armó el agente, de solo lectura.">
                <PlanComidasScreen t={t} />
              </Phone>
            </div>
          </div>

          <TweaksPanel>
            <TweakSection label="Agente" />
            <TweakToggle label="Mostrar ajuste del agente" value={t.ajuste}
              onChange={(v) => setTweak("ajuste", v)} />
          </TweaksPanel>
        </div>
      );
    }

    function fit() {
      const el = document.getElementById("fit");
      if (!el) return;
      const stage = el.querySelector(".c-stage");
      const w = stage.scrollWidth, h = stage.scrollHeight;
      const scale = Math.min(1, (window.innerWidth - 48) / w, (window.innerHeight - 40) / h);
      el.style.transform = "scale(" + scale + ")";
    }
    window.addEventListener("resize", fit);
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    setTimeout(fit, 80);
    setTimeout(fit, 400);
  </script>
</body>
</html>
