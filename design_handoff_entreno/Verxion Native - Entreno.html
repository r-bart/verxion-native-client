<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>verxion — vista Entreno · exploración</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="assets/colors_and_type.css">
<style>
  :root {
    --lava: #FF6262;
    --lava-glow: rgba(255,98,98,0.55);
    --glass-fill: rgba(255,255,255,0.06);
    --glass-stroke: rgba(255,255,255,0.12);
    --glass-hi: inset 0 1px 0 0 rgba(255,255,255,0.20), inset 0 0 0 1px rgba(255,255,255,0.05);
    --ease: cubic-bezier(0.2,0.8,0.2,1);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; min-height: 100vh; background: #050507; color: #fff;
    font-family: var(--vx-font-mono); overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  body::before {
    content: ""; position: fixed; inset: -14vh -14vw; z-index: 0;
    background:
      radial-gradient(38vw 38vw at 16% 14%, rgba(255,98,98,0.24), transparent 60%),
      radial-gradient(34vw 34vw at 84% 82%, rgba(0,210,255,0.14), transparent 62%),
      radial-gradient(30vw 30vw at 62% 102%, rgba(168,85,247,0.16), transparent 60%),
      #050507;
    filter: blur(50px);
  }

  /* stage / scaling */
  #root { position: relative; z-index: 1; }
  .e-fit { transform-origin: center center; }
  .e-stage { display: flex; gap: 60px; align-items: flex-start; justify-content: center; }
  .e-col { display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .e-coltag { display: flex; flex-direction: column; align-items: center; gap: 5px; text-align: center; }
  .e-coltag__name { font: 700 16px/1.25 var(--vx-font-sans); letter-spacing: -0.02em; color: #fff; white-space: nowrap; }
  .e-coltag__name b { color: var(--lava); }
  .e-coltag__desc { font: 400 12px/1.4 var(--vx-font-mono); color: rgba(255,255,255,0.5); max-width: 32ch; }

  /* ───────── SCREEN SHELL ───────── */
  .e-screen { position: relative; height: 100%; overflow: hidden; color: #fff; font-family: var(--vx-font-mono); }
  .e-screen::before {
    content: ""; position: absolute; inset: 0; z-index: 0;
    background:
      radial-gradient(72% 44% at 26% 0%, rgba(255,98,98,0.30), transparent 70%),
      radial-gradient(60% 36% at 96% 18%, rgba(168,85,247,0.18), transparent 70%),
      radial-gradient(96% 52% at 50% 104%, rgba(0,210,255,0.08), transparent 76%),
      #0a0a0c;
  }
  .e-scroll { position: absolute; inset: 0; z-index: 1; overflow-y: auto; scrollbar-width: none;
    padding: 0 0 116px; }
  .e-scroll::-webkit-scrollbar { display: none; }

  /* ───────── HEADER + SELECTOR ───────── */
  .e-head { padding: 58px 16px 4px; position: sticky; top: 0; z-index: 4;
    background: linear-gradient(180deg, rgba(10,10,12,0.92) 64%, rgba(10,10,12,0)); backdrop-filter: blur(8px); }
  .e-headrow { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .e-title { font: 700 30px/1.05 var(--vx-font-sans); letter-spacing: -0.035em; color: #fff; }
  .e-libbtn { width: 40px; height: 40px; border-radius: 9999px; flex-shrink: 0; border: 0; cursor: pointer;
    display: flex; align-items: center; justify-content: center; color: #fff;
    background: rgba(120,120,128,0.22); border: 0.5px solid rgba(255,255,255,0.16);
    box-shadow: inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08);
    backdrop-filter: blur(12px) saturate(180%); -webkit-backdrop-filter: blur(12px) saturate(180%);
    transition: background .15s var(--ease); }
  .e-libbtn:hover { background: rgba(120,120,128,0.34); }
  .e-libbtn:active { opacity: 0.8; }
  .e-libbtn svg { color: rgba(255,255,255,0.78); }
  .e-seg { position: relative; display: flex; margin-top: 14px; padding: 3px; border-radius: 14px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); }
  .e-seg__thumb { position: absolute; top: 3px; bottom: 3px; border-radius: 11px;
    background: rgba(255,255,255,0.10); border: 1px solid rgba(255,255,255,0.12);
    box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.14), 0 2px 8px rgba(0,0,0,0.3);
    transition: left .22s var(--ease), width .22s var(--ease); }
  .e-seg__btn { position: relative; z-index: 1; flex: 1; border: 0; background: transparent; cursor: pointer;
    padding: 9px 4px; font: 600 13px/1 var(--vx-font-sans); letter-spacing: -0.01em; color: rgba(255,255,255,0.5);
    transition: color .2s var(--ease); }
  .e-seg__btn.is-on { color: var(--lava); }

  /* content wrap */
  .e-pad { padding: 10px 16px 0; display: flex; flex-direction: column; gap: 12px; }
  .e-section { font: 600 11px/1 var(--vx-font-mono); letter-spacing: 0.11em; text-transform: uppercase;
    color: rgba(255,255,255,0.46); padding: 4px 2px 0; }
  .e-section--sp { margin-top: 6px; }
  .e-eyebrow { font: 700 10px/1 var(--vx-font-mono); letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.5); }

  .e-bubble { border-radius: 9999px; display: inline-flex; align-items: center; justify-content: center;
    border: 1px solid rgba(255,255,255,0.12); box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.16); flex-shrink: 0; }

  /* score chip */
  .e-score { display: inline-flex; align-items: center; gap: 4px; padding: 5px 9px; border-radius: 9999px;
    font: 700 12px/1 var(--vx-font-sans); letter-spacing: -0.01em; white-space: nowrap; }
  .e-score em { font-style: normal; font-weight: 600; font-size: 10px; opacity: 0.55; }
  .e-score.is-ahead { color: #5fe39a; background: rgba(46,204,113,0.12); border: 1px solid rgba(46,204,113,0.24); }
  .e-score.is-on { color: var(--vx-neutral); background: var(--vx-neutral-bg); border: 1px solid rgba(255,185,0,0.28); }
  .e-score.is-behind { color: var(--vx-health); background: var(--vx-health-bg); border: 1px solid rgba(255,71,87,0.3); }

  /* ───────── ROUTINE HERO ───────── */
  .e-hero { padding: 18px; border-radius: 24px; background: var(--glass-fill);
    backdrop-filter: blur(30px) saturate(150%); -webkit-backdrop-filter: blur(30px) saturate(150%);
    border: 1px solid var(--glass-stroke); box-shadow: var(--glass-hi), 0 14px 38px rgba(0,0,0,0.32); }
  .e-hero--tap { display: block; width: 100%; text-align: left; cursor: pointer;
    transition: border-color .15s var(--ease), background .15s var(--ease); }
  .e-hero--tap:hover { border-color: var(--vx-border-2); }
  .e-hero--tap:active { opacity: 0.92; }
  .e-hero__top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .e-by { display: inline-flex; align-items: center; gap: 5px; font: 500 10px/1 var(--vx-font-mono);
    color: rgba(255,255,255,0.42); white-space: nowrap; }
  .e-hero__name { font: 700 25px/1.1 var(--vx-font-sans); letter-spacing: -0.03em; color: #fff; margin-top: 11px; }
  .e-hero__switch { display: inline-flex; align-items: center; gap: 8px; max-width: 100%; text-align: left; cursor: pointer;
    border: 0; background: transparent; padding: 0; margin-top: 11px; transition: opacity .15s var(--ease); }
  .e-hero__switch:active { opacity: 0.7; }
  .e-hero__switch .e-hero__name { margin-top: 0; white-space: nowrap; }
  .e-hero__meta { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; margin-top: 10px; }
  .e-tag { display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 9999px;
    font: 600 11px/1 var(--vx-font-mono); white-space: nowrap; }
  .e-tag--goal { color: var(--lava); background: var(--vx-lava-bg); border: 1px solid rgba(255,98,98,0.3); }
  .e-hero__split { display: inline-flex; align-items: center; gap: 6px; font: 500 11.5px/1 var(--vx-font-mono);
    color: rgba(255,255,255,0.58); white-space: nowrap; }
  .e-hero__split svg { color: rgba(255,255,255,0.4); }
  .e-hero__divider { height: 1px; background: rgba(255,255,255,0.09); margin: 16px 0 14px; }

  /* week block — bar */
  .e-week__head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 11px; }
  .e-week__lbl { font: 500 13px/1 var(--vx-font-mono); color: rgba(255,255,255,0.72); }
  .e-week__lbl b { color: #fff; font-weight: 700; }
  .e-week__score { display: inline-flex; align-items: center; gap: 8px; }
  .e-week__score > span { font: 500 11px/1 var(--vx-font-mono); color: rgba(255,255,255,0.45); white-space: nowrap; }
  .e-week__cells { display: flex; gap: 6px; }
  .e-week__cell { flex: 1; height: 7px; border-radius: 9999px; background: rgba(255,255,255,0.1); }
  .e-week__cell.is-done { background: var(--lava); }
  .e-week__cell.is-now { background: rgba(255,255,255,0.1); position: relative; }
  .e-week__fill { position: absolute; left: 0; top: 0; bottom: 0; min-width: 7px; border-radius: 9999px;
    background: var(--lava); box-shadow: 0 0 10px var(--lava-glow); }
  @media (prefers-reduced-motion: no-preference) {
    .e-week__fill { animation: e-pulse 2.4s var(--ease) infinite; }
  }
  @keyframes e-pulse { 0%,100% { box-shadow: 0 0 5px rgba(255,98,98,0.3); } 50% { box-shadow: 0 0 13px var(--lava-glow); } }

  /* week block — ring */
  .e-week--ring { display: flex; align-items: center; gap: 16px; }
  .e-ring { position: relative; flex-shrink: 0; }
  .e-ring__c { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  .e-ring__c b { font: 700 22px/1 var(--vx-font-sans); letter-spacing: -0.03em; color: #fff; }
  .e-ring__c em { font: 600 13px/1 var(--vx-font-sans); font-style: normal; color: rgba(255,255,255,0.4); }
  .e-week--ring .e-week__side { display: flex; flex-direction: column; gap: 9px; }
  .e-week--ring .e-week__lbl { font-size: 14px; }
  .e-week--ring .e-week__score { gap: 8px; }

  /* ───────── ALL ROUTINES LINK ───────── */
  .e-allrt { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 10px; cursor: pointer;
    margin-top: 6px; padding: 13px 15px; border-radius: 16px; background: var(--glass-fill);
    border: 1px solid var(--glass-stroke); box-shadow: var(--glass-hi); transition: border-color .15s var(--ease); }
  .e-allrt:hover { border-color: var(--vx-border-2); }
  .e-allrt:active { opacity: 0.9; }
  .e-allrt__l { display: inline-flex; align-items: center; gap: 9px; font: 600 13.5px/1 var(--vx-font-sans); letter-spacing: -0.01em; color: #fff; }
  .e-allrt__l svg { color: rgba(255,255,255,0.55); }
  .e-allrt__r { display: inline-flex; align-items: center; gap: 4px; font: 600 12px/1 var(--vx-font-mono); color: rgba(255,255,255,0.5); }
  .e-allrt__r svg { color: rgba(255,255,255,0.32); }

  /* ───────── NEXT SESSION ───────── */
  .e-next { display: flex; align-items: center; gap: 13px; padding: 15px 16px; border-radius: 20px;
    background: linear-gradient(180deg, rgba(255,98,98,0.10), rgba(255,255,255,0.05));
    border: 1px solid rgba(255,98,98,0.26); box-shadow: var(--glass-hi); }
  .e-next--rest { background: linear-gradient(180deg, rgba(155,89,182,0.12), rgba(255,255,255,0.04));
    border-color: rgba(155,89,182,0.3); }
  .e-next__body { flex: 1; min-width: 0; }
  .e-next__k { font: 700 9.5px/1 var(--vx-font-mono); letter-spacing: 0.12em; text-transform: uppercase; }
  .e-next__t { font: 600 15.5px/1.2 var(--vx-font-sans); letter-spacing: -0.01em; color: #fff; margin-top: 5px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .e-next__d { font: 500 11.5px/1.3 var(--vx-font-mono); color: rgba(255,255,255,0.56); margin-top: 4px; }
  .e-next__tm { font: 500 11px/1.3 var(--vx-font-mono); color: rgba(255,255,255,0.4); margin-top: 5px; }
  .e-next__go { width: 44px; height: 44px; border-radius: 9999px; border: none; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; background: var(--lava); color: #0a0a0a;
    box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.4), 0 0 20px rgba(255,98,98,0.45); transition: background .15s var(--ease); }
  .e-next__go:hover { background: var(--vx-lava-hover); }
  .e-next__go:active { opacity: 0.85; }
  .e-next__go svg { margin-left: 2px; }

  /* ───────── AGENT NOTE ───────── */
  .e-agent { display: flex; gap: 12px; align-items: flex-start; padding: 14px 16px; border-radius: 18px;
    background: rgba(255,98,98,0.09); backdrop-filter: blur(20px) saturate(150%); -webkit-backdrop-filter: blur(20px) saturate(150%);
    border: 1px solid rgba(255,98,98,0.2); box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.07); }
  .e-agent__mark { flex-shrink: 0; margin-top: 1px; }
  .e-agent__from { font: 700 11px/1 var(--vx-font-sans); color: var(--lava); margin-bottom: 5px; }
  .e-agent__msg { font: 400 12.5px/1.5 var(--vx-font-mono); color: rgba(255,255,255,0.9); text-wrap: pretty; }

  /* ───────── SPINE (week rotation) ───────── */
  .e-spine { display: flex; flex-direction: column; padding: 0 2px; }
  .e-srow { display: grid; grid-template-columns: 34px 24px 1fr; gap: 11px; align-items: stretch; padding-bottom: 14px; }
  .e-srow:last-child { padding-bottom: 0; }
  .e-srow__day { font: 600 11px/1 var(--vx-font-mono); color: rgba(255,255,255,0.5); text-align: right; padding-top: 8px; }
  .e-srow.is-up .e-srow__day { color: rgba(255,255,255,0.32); }
  .e-srow.is-now .e-srow__day { color: var(--lava); }
  .e-srow__rail { position: relative; display: flex; justify-content: center; }
  .e-srow__rail::before { content: ""; position: absolute; left: 50%; top: 6px; bottom: -14px; width: 2px;
    transform: translateX(-50%); background: rgba(255,255,255,0.1); }
  .e-srow:last-child .e-srow__rail::before { display: none; }
  .e-srow.is-done .e-srow__rail::before { background: rgba(255,98,98,0.4); }
  .e-srow__node { position: relative; z-index: 1; width: 24px; height: 24px; border-radius: 9999px; flex-shrink: 0;
    align-self: flex-start; margin-top: 4px; display: flex; align-items: center; justify-content: center;
    background: #15151a; border: 1px solid rgba(255,255,255,0.16); color: rgba(255,255,255,0.5); }
  .e-srow.is-done .e-srow__node { background: var(--vx-lava); border-color: var(--vx-lava); color: #0a0a0a;
    box-shadow: 0 0 12px rgba(255,98,98,0.5); }
  .e-srow.is-now .e-srow__node { border-color: var(--lava); box-shadow: 0 0 0 4px rgba(255,98,98,0.14); }
  .e-srow__card { padding: 11px 13px; border-radius: 15px; min-width: 0;
    background: var(--glass-fill); border: 1px solid var(--glass-stroke); box-shadow: var(--glass-hi); }
  .e-srow.is-now .e-srow__card { border-color: rgba(255,98,98,0.3);
    background: linear-gradient(180deg, rgba(255,98,98,0.08), rgba(255,255,255,0.05)); }
  .e-srow.is-up .e-srow__card { background: rgba(255,255,255,0.035); }
  .e-srow__head { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .e-srow__name { font: 600 13.5px/1.2 var(--vx-font-sans); letter-spacing: -0.01em; color: #fff; }
  .e-srow.is-up .e-srow__name { color: rgba(255,255,255,0.74); }
  .e-srow__split { font: 700 8.5px/1 var(--vx-font-mono); letter-spacing: 0.08em; text-transform: uppercase;
    padding: 3px 6px; border-radius: 9999px; }
  .e-srow__badge { font: 700 8.5px/1 var(--vx-font-mono); letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--lava); padding: 3px 7px; border-radius: 9999px; background: var(--vx-lava-bg); border: 1px solid rgba(255,98,98,0.3); margin-left: auto; }
  .e-srow__sub { font: 500 11px/1.3 var(--vx-font-mono); color: rgba(255,255,255,0.5); margin-top: 5px; }
  .e-srow.is-up .e-srow__sub { color: rgba(255,255,255,0.36); }

  /* ───────── EMPTY / INVITE ───────── */
  .e-invite { position: relative; padding: 28px 20px 22px; border-radius: 26px;
    display: flex; flex-direction: column; align-items: center; text-align: center; gap: 11px;
    background: rgba(255,98,98,0.09); backdrop-filter: blur(28px) saturate(150%); -webkit-backdrop-filter: blur(28px) saturate(150%);
    border: 1px solid rgba(255,98,98,0.22); box-shadow: var(--glass-hi), 0 16px 40px rgba(0,0,0,0.34); }
  .e-invite__title { font: 700 21px/1.18 var(--vx-font-sans); letter-spacing: -0.03em; color: #fff; }
  .e-invite__body { font: 400 12.5px/1.55 var(--vx-font-mono); color: rgba(255,255,255,0.62); max-width: 32ch; text-wrap: pretty; }
  .e-prompt { margin-top: 4px; display: flex; align-items: center; gap: 8px; padding: 11px 14px; border-radius: 14px;
    background: rgba(0,0,0,0.32); border: 1px solid rgba(255,255,255,0.1); font: 500 12px/1.4 var(--vx-font-mono);
    color: rgba(255,255,255,0.82); text-align: left; }
  .e-prompt__c { color: var(--lava); font-weight: 700; font-size: 15px; flex-shrink: 0; }

  .e-emptynote { padding: 40px 24px; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 12px; }
  .e-emptynote__t { font: 700 17px/1.2 var(--vx-font-sans); letter-spacing: -0.02em; color: #fff; margin-top: 4px; }
  .e-emptynote__d { font: 400 12.5px/1.5 var(--vx-font-mono); color: rgba(255,255,255,0.5); max-width: 28ch; text-wrap: pretty; }

  /* ───────── SESIONES ───────── */
  .e-sumrow { display: flex; gap: 10px; }
  .e-sum { flex: 1; padding: 13px 14px; border-radius: 16px; background: var(--glass-fill);
    border: 1px solid var(--glass-stroke); box-shadow: var(--glass-hi); display: flex; flex-direction: column; gap: 5px; }
  .e-sum b { font: 700 19px/1 var(--vx-font-sans); letter-spacing: -0.03em; color: #fff; }
  .e-sum b em { font-style: normal; font-size: 12px; color: rgba(255,255,255,0.5); font-weight: 600; }
  .e-sum span { font: 500 10px/1.2 var(--vx-font-mono); color: rgba(255,255,255,0.5); }
  .e-sessions { display: flex; flex-direction: column; gap: 8px; }
  .e-seshead { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 4px 2px 0; }
  .e-seslink { display: inline-flex; align-items: center; gap: 3px; cursor: pointer; border: 0; background: transparent;
    font: 600 11.5px/1 var(--vx-font-sans); letter-spacing: -0.01em; color: var(--lava); padding: 2px 0; }
  .e-seslink svg { color: var(--lava); }
  .e-seslink:active { opacity: 0.7; }
  .e-sess { display: flex; align-items: center; gap: 11px; padding: 12px 14px; border-radius: 16px;
    background: var(--glass-fill); border: 1px solid var(--glass-stroke); box-shadow: var(--glass-hi); }
  .e-sess--tap { transition: border-color .15s var(--ease); }
  .e-sess--tap:hover { border-color: var(--vx-border-2); }
  .e-sess--tap:active { opacity: 0.9; }
  .e-sess__date { font: 600 11px/1.2 var(--vx-font-mono); color: rgba(255,255,255,0.5); width: 42px; flex-shrink: 0; }
  .e-sess__body { flex: 1; min-width: 0; }
  .e-sess__name { font: 600 13.5px/1.2 var(--vx-font-sans); color: #fff; display: flex; align-items: center; gap: 7px; }
  .e-sess__pr { display: inline-flex; align-items: center; gap: 3px; font: 700 9px/1 var(--vx-font-mono);
    color: var(--vx-neutral); padding: 3px 6px; border-radius: 9999px; background: var(--vx-neutral-bg); border: 1px solid rgba(255,185,0,0.3); }
  .e-sess__bar { height: 5px; border-radius: 9999px; background: rgba(255,255,255,0.09); margin-top: 8px; overflow: hidden; }
  .e-sess__bar span { display: block; height: 100%; border-radius: 9999px; box-shadow: 0 0 8px currentColor; }
  .e-sess__meta { text-align: right; flex-shrink: 0; display: flex; flex-direction: column; gap: 4px; }
  .e-sess__vol { font: 700 14px/1 var(--vx-font-sans); letter-spacing: -0.02em; color: #fff; }
  .e-sess__vol em { font-style: normal; font-size: 10px; color: rgba(255,255,255,0.5); font-weight: 500; }
  .e-sess__delta { font: 600 11px/1 var(--vx-font-mono); }
  .e-sess__delta.is-up { color: #5fe39a; }
  .e-sess__delta.is-down { color: var(--vx-health); }

  /* ───────── EJERCICIOS ───────── */
  .e-searchbar { display: flex; align-items: center; gap: 9px; padding: 11px 13px; border-radius: 14px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
  .e-searchbar__in { flex: 1; min-width: 0; border: 0; background: transparent; outline: none;

            <TweakSection label="Vista" />
            <TweakRadio label="Segmento" value={t.segment}
              options={[{ value: "rutina", label: "Rutina" }, { value: "sesiones", label: "Sesiones" }, { value: "ejercicios", label: "Ejercicios" }]}
              onChange={(v) => setTweak("segment", v)} />
            <TweakRadio label="Progreso semanal" value={t.weekViz}
              options={[{ value: "bar", label: "Barra" }, { value: "ring", label: "Anillo" }]}
              onChange={(v) => setTweak("weekViz", v)} />

            <TweakSection label="Agente" />
            <TweakToggle label="Pulso del agente" value={t.agentPulse}
              onChange={(v) => setTweak("agentPulse", v)} />
          </TweaksPanel>
        </div>
      );
    }

    function fit() {
      const el = document.getElementById("fit");
      if (!el) return;
      const stage = el.querySelector(".e-stage");
      const w = stage.scrollWidth, h = stage.scrollHeight;
      const scale = Math.min(1, (window.innerWidth - 48) / w, (window.innerHeight - 40) / h);
      el.style.transform = "scale(" + scale + ")";
    }
    window.addEventListener("resize", fit);
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    setTimeout(fit, 80);
    setTimeout(fit, 400);
  </script>
</body>
</html>
