<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>verxion — Prescripción del día</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="assets/colors_and_type.css">
<style>
  :root {
    --lava: #FF6262;
    --lava-glow: rgba(255,98,98,0.55);
    --good: #5FE39A;
    --glass-fill: rgba(255,255,255,0.06);
    --glass-stroke: rgba(255,255,255,0.12);
    --glass-hi: inset 0 1px 0 0 rgba(255,255,255,0.20), inset 0 0 0 1px rgba(255,255,255,0.05);
    --ease: cubic-bezier(0.2,0.8,0.2,1);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; min-height: 100vh; background: #050507; color: #fff;
    font-family: var(--vx-font-mono); overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  body::before {
    content: ""; position: fixed; inset: -14vh -14vw; z-index: 0;
    background:
      radial-gradient(38vw 38vw at 16% 14%, rgba(255,98,98,0.22), transparent 60%),
      radial-gradient(34vw 34vw at 84% 84%, rgba(0,210,255,0.12), transparent 62%),
      radial-gradient(30vw 30vw at 60% 104%, rgba(168,85,247,0.14), transparent 60%),
      #050507;
    filter: blur(52px);
  }

  /* stage / scaling */
  #root { position: relative; z-index: 1; }
  .p-fit { transform-origin: center center; }
  .p-stage { display: flex; gap: 60px; align-items: flex-start; justify-content: center; }
  .p-col { display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .p-coltag { display: flex; flex-direction: column; align-items: center; gap: 5px; text-align: center; }
  .p-coltag__name { font: 700 16px/1.25 var(--vx-font-sans); letter-spacing: -0.02em; color: #fff; white-space: nowrap; }
  .p-coltag__name b { color: var(--lava); }
  .p-coltag__desc { font: 400 12px/1.4 var(--vx-font-mono); color: rgba(255,255,255,0.5); max-width: 36ch; }

  /* ───────── SCREEN SHELL ───────── */
  .p-screen { position: relative; height: 100%; overflow: hidden; color: #fff; font-family: var(--vx-font-mono); }
  .p-screen::before {
    content: ""; position: absolute; inset: 0; z-index: 0;
    background:
      radial-gradient(74% 42% at 24% -2%, rgba(255,98,98,0.28), transparent 70%),
      radial-gradient(58% 34% at 98% 14%, rgba(168,85,247,0.15), transparent 70%),
      radial-gradient(96% 50% at 50% 104%, rgba(0,210,255,0.06), transparent 76%),
      #0a0a0c;
  }
  .p-scroll { position: absolute; inset: 0; z-index: 1; overflow-y: auto; scrollbar-width: none; padding: 0 0 126px; }
  .p-scroll::-webkit-scrollbar { display: none; }

  /* ───────── TOP CHROME (sticky) ───────── */
  .p-chrome { position: sticky; top: 0; z-index: 6; padding: 56px 14px 10px;
    display: flex; align-items: center; gap: 10px;
    background: linear-gradient(180deg, rgba(10,10,12,0.94) 58%, rgba(10,10,12,0));
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
  .p-chrome__btn { width: 38px; height: 38px; border-radius: 9999px; flex-shrink: 0; border: 0; cursor: pointer;
    display: flex; align-items: center; justify-content: center; color: #fff;
    background: rgba(120,120,128,0.26); border: 0.5px solid rgba(255,255,255,0.16);
    box-shadow: inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08);
    backdrop-filter: blur(12px) saturate(180%); -webkit-backdrop-filter: blur(12px) saturate(180%); }
  .p-chrome__btn:active { opacity: 0.8; }
  .p-chrome__title { flex: 1; text-align: center; font: 700 13px/1 var(--vx-font-sans); letter-spacing: -0.01em; color: rgba(255,255,255,0.82); }

  /* ───────── content padding ───────── */
  .p-pad { padding: 6px 16px 0; display: flex; flex-direction: column; gap: 14px; }
  .p-section { display: flex; align-items: center; gap: 8px; padding: 8px 2px 0; }
  .p-section__k { font: 700 10.5px/1 var(--vx-font-mono); letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.46); }
  .p-section__count { font: 600 10.5px/1 var(--vx-font-mono); color: rgba(255,255,255,0.34); }
  .p-section__line { flex: 1; height: 1px; background: rgba(255,255,255,0.07); }
  .p-eyebrow { font: 700 10px/1 var(--vx-font-mono); letter-spacing: 0.13em; text-transform: uppercase; }

  .p-bubble { border-radius: 9999px; display: inline-flex; align-items: center; justify-content: center;
    border: 1px solid rgba(255,255,255,0.12); box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.16); flex-shrink: 0; }

  /* ───────── HERO ───────── */
  .p-hero { padding: 18px; border-radius: 24px; background: var(--glass-fill);
    backdrop-filter: blur(30px) saturate(150%); -webkit-backdrop-filter: blur(30px) saturate(150%);
    border: 1px solid var(--glass-stroke); box-shadow: var(--glass-hi), 0 14px 38px rgba(0,0,0,0.32); }
  .p-hero__top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .p-hero__ctx { display: inline-flex; align-items: center; gap: 5px; font: 500 10.5px/1 var(--vx-font-mono);
    color: rgba(255,255,255,0.46); white-space: nowrap; }
  .p-hero__ctx svg { color: rgba(255,255,255,0.4); }
  .p-hero__row { display: flex; align-items: center; gap: 13px; margin-top: 14px; }
  .p-hero__name { font: 700 27px/1.05 var(--vx-font-sans); letter-spacing: -0.035em; color: #fff; }
  .p-hero__focus { font: 500 12.5px/1.3 var(--vx-font-mono); color: rgba(255,255,255,0.6); margin-top: 5px; }
  .p-hero__stats { display: flex; margin-top: 18px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.09); }
  .p-stat { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
  .p-stat + .p-stat::before { content: ""; position: absolute; left: 0; top: 2px; bottom: 2px; width: 1px; background: rgba(255,255,255,0.08); }
  .p-stat svg { color: rgba(255,255,255,0.4); }
  .p-stat b { font: 700 17px/1 var(--vx-font-sans); letter-spacing: -0.03em; color: #fff; margin-top: 2px; }
  .p-stat span { font: 500 9px/1 var(--vx-font-mono); letter-spacing: 0.03em; text-transform: uppercase; color: rgba(255,255,255,0.46); }

  /* ───────── AGENT NOTE ───────── */
  .p-agent { display: flex; gap: 12px; align-items: flex-start; padding: 14px 16px; border-radius: 18px;
    background: rgba(255,98,98,0.09); backdrop-filter: blur(20px) saturate(150%); -webkit-backdrop-filter: blur(20px) saturate(150%);
    border: 1px solid rgba(255,98,98,0.2); box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.07); }
  .p-agent__mark { flex-shrink: 0; margin-top: 1px; }
  .p-agent__from { font: 700 10.5px/1 var(--vx-font-sans); color: var(--lava); margin-bottom: 5px; }
  .p-agent__msg { font: 400 12.5px/1.5 var(--vx-font-mono); color: rgba(255,255,255,0.9); text-wrap: pretty; }

  /* ───────── EXERCISE CARD (prescription) ───────── */
  .p-list { display: flex; flex-direction: column; gap: 9px; }
  .p-ex { display: flex; gap: 12px; padding: 14px; border-radius: 18px;
    background: var(--glass-fill); border: 1px solid var(--glass-stroke); box-shadow: var(--glass-hi); }
  .p-ex.is-key { background: linear-gradient(180deg, rgba(255,98,98,0.08), rgba(255,255,255,0.05)); border-color: rgba(255,98,98,0.26); }
  .p-ex.is-swap { border-color: rgba(0,210,255,0.3); }
  .p-ex__rail { flex-shrink: 0; padding-top: 1px; }
  .p-ex__n { width: 26px; height: 26px; border-radius: 9999px; display: flex; align-items: center; justify-content: center;
    font: 700 12px/1 var(--vx-font-sans); color: rgba(255,255,255,0.55);
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.16); }
  .p-ex__body { flex: 1; min-width: 0; }
  .p-ex__head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .p-ex__name { font: 600 15px/1.2 var(--vx-font-sans); letter-spacing: -0.01em; color: #fff;
    display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
  .p-ex__keytag { font: 700 8px/1 var(--vx-font-mono); letter-spacing: 0.07em; text-transform: uppercase; padding: 3px 6px; border-radius: 9999px; }
  .p-ex__muscle { font: 500 11px/1 var(--vx-font-mono); color: rgba(255,255,255,0.5); margin-top: 5px; }
  .p-ex__target { text-align: right; flex-shrink: 0; }
  .p-ex__target span { display: block; font: 700 15px/1 var(--vx-font-sans); letter-spacing: -0.02em; color: #fff; white-space: nowrap; }
  .p-ex__target em { font-style: normal; font: 500 8.5px/1 var(--vx-font-mono); letter-spacing: 0.06em; text-transform: uppercase; color: rgba(255,255,255,0.4); }
  .p-ex__swapnote { margin-top: 10px; display: flex; align-items: center; gap: 6px; font: 500 10.5px/1.3 var(--vx-font-mono);
    color: var(--vx-body); padding: 7px 9px; border-radius: 10px; background: rgba(0,210,255,0.08); border: 1px solid rgba(0,210,255,0.18); }
  .p-ex__swapnote b { color: rgba(255,255,255,0.7); font-weight: 600; }
  .p-ex__rx { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 11px; }
  .p-rx { display: inline-flex; align-items: center; gap: 4px; font: 600 12px/1 var(--vx-font-mono); color: #fff;
    padding: 5px 9px; border-radius: 9999px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); }
  .p-rx b { font-weight: 700; }
  .p-rx--mut { color: rgba(255,255,255,0.6); background: transparent; border-color: rgba(255,255,255,0.1); }
  .p-rx--mut svg { color: rgba(255,255,255,0.4); }
  .p-rx--up { color: var(--good); background: rgba(46,204,113,0.1); border-color: rgba(46,204,113,0.24); font-weight: 700; }
  .p-ex__last { font: 500 11px/1 var(--vx-font-mono); color: rgba(255,255,255,0.42); margin-top: 9px; }

  /* ───────── AGENT EDIT (read-only edit surface) ───────── */
  .p-edit { width: 100%; display: flex; align-items: center; gap: 12px; padding: 13px 15px; border-radius: 16px; cursor: pointer;
    background: rgba(255,255,255,0.04); border: 1px dashed rgba(255,255,255,0.18); text-align: left;
    transition: background .15s var(--ease), border-color .15s var(--ease); }
  .p-edit:hover { background: rgba(255,98,98,0.07); border-color: rgba(255,98,98,0.3); }
  .p-edit:active { opacity: 0.85; }
  .p-edit__iso { flex-shrink: 0; }
  .p-edit__body { flex: 1; min-width: 0; }
  .p-edit__label { font: 600 13px/1.2 var(--vx-font-sans); color: #fff; }
  .p-edit__hint { font: 500 10.5px/1.3 var(--vx-font-mono); color: rgba(255,255,255,0.46); margin-top: 4px; }
  .p-edit__c { font: 700 18px/1 var(--vx-font-sans); color: var(--lava); flex-shrink: 0; }

  /* ───────── STICKY ACTION BAR ───────── */
  .p-actions { position: absolute; left: 0; right: 0; bottom: 0; z-index: 7; padding: 14px 16px 30px;
    display: flex; flex-direction: column; gap: 9px;
    background: linear-gradient(180deg, rgba(10,10,12,0) 0%, rgba(10,10,12,0.92) 32%); }
  .p-btn { width: 100%; height: 52px; border: none; border-radius: 9999px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--lava); color: #0a0a0a; font: 700 15.5px/1 var(--vx-font-sans); letter-spacing: -0.01em;
    box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.4), 0 8px 22px rgba(255,98,98,0.32); transition: background .15s var(--ease); }
  .p-btn:hover { background: var(--vx-lava-hover); }
  .p-btn:active { opacity: 0.85; }
  .p-actions__sync { display: flex; align-items: center; justify-content: center; gap: 6px;
    font: 500 10px/1 var(--vx-font-mono); color: rgba(255,255,255,0.4); }
  .p-actions__dot { width: 5px; height: 5px; border-radius: 9999px; background: var(--lava); box-shadow: 0 0 6px var(--lava-glow); }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="nav.jsx"></script>
  <script type="text/babel" src="prescripcion-core.jsx"></script>

  <script type="text/babel">
    function PrescripcionScreen({ t }) {
      const model = buildPrescripcion(t);
      const { cfg, plan, ajuste } = model;
      // el ejercicio sustituido (si toca) es el 4º — un patrón accesorio
      const swapIdx = ajuste ? 3 : -1;

      return (
        <div className="p-screen">
          <div className="p-scroll">
            <div className="p-chrome">
              <button className="p-chrome__btn" aria-label="Volver" onClick={() => vxNav(VX.ENTRENO, { segment: "rutina" })}><Icon.chevronLeft size={20} /></button>
              <div className="p-chrome__title">Sesión de hoy</div>
              <button className="p-chrome__btn" aria-label="Más"><PIcon.more size={20} /></button>
            </div>

            <div className="p-pad">
              <PHero model={model} />
              <PAgentNote msg={model.note} />

              <div className="p-section">
                <span className="p-section__k">El plan</span>
                <span className="p-section__count">{plan.ex.length} ejercicios · en orden</span>
                <span className="p-section__line" />
              </div>
              <div className="p-list">
                {plan.ex.map((ex, i) => (
                  <PExCard key={ex.name} ex={ex} idx={i + 1} cfg={cfg}
                    swapped={i === swapIdx ? plan.swap : null} />
                ))}
              </div>

              <PAgentEdit />
            </div>
          </div>

          <div className="p-actions">
            <button className="p-btn" onClick={() => vxNav(VX.SESION, { estado: "activa" })}><PIcon.play size={16} /> Empezar sesión</button>
            <div className="p-actions__sync">
              <span className="p-actions__dot" /> El agente seguirá la sesión en vivo
            </div>
          </div>
        </div>
      );
    }

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "dia": "legs",
      "ajuste": true
    }/*EDITMODE-END*/;

    function Phone({ tag, desc, children }) {
      return (
        <div className="p-col">
          <div className="p-coltag">
            <div className="p-coltag__name" dangerouslySetInnerHTML={{ __html: tag }} />
            <div className="p-coltag__desc">{desc}</div>
          </div>
          <IOSDevice dark={true}>{children}</IOSDevice>
        </div>
      );
    }

    const DIA_DESC = {
      push: "Día de empuje: el press banca es el ejercicio principal, marcado y con objetivo de carga.",
      pull: "Día de tirón: dominada lastrada al frente, volumen de espalda en progresión.",
      legs: "Día de pierna: la sentadilla es PR de carga hoy — el plan lo deja claro.",
    };

    function App() {
      const [t, setTweak] = useTweaks({ ...TWEAK_DEFAULTS, ...vxReadParams(["dia", "ajuste"]) });
      return (
        <div>
          <div className="p-fit" id="fit">
            <div className="p-stage">
              <Phone tag="verxion · <b>Prescripción del día</b>"
                desc={DIA_DESC[t.dia] || DIA_DESC.push}>
                <PrescripcionScreen t={t} />
              </Phone>
            </div>
          </div>

          <TweaksPanel>
            <TweakSection label="El día" />
            <TweakRadio label="Tipo" value={t.dia}
              options={[{ value: "push", label: "Push" }, { value: "pull", label: "Pull" }, { value: "legs", label: "Legs" }]}
              onChange={(v) => setTweak("dia", v)} />
            <TweakSection label="Agente" />
            <TweakToggle label="Mostrar ajuste del agente" value={t.ajuste}
              onChange={(v) => setTweak("ajuste", v)} />
          </TweaksPanel>
        </div>
      );
    }

    function fit() {
      const el = document.getElementById("fit");
      if (!el) return;
      const stage = el.querySelector(".p-stage");
      const w = stage.scrollWidth, h = stage.scrollHeight;
      const scale = Math.min(1, (window.innerWidth - 48) / w, (window.innerHeight - 40) / h);
      el.style.transform = "scale(" + scale + ")";
    }
    window.addEventListener("resize", fit);
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    setTimeout(fit, 80);
    setTimeout(fit, 400);
  </script>
</body>
</html>
