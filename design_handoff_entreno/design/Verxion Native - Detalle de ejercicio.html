<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>verxion — Detalle de ejercicio</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="assets/colors_and_type.css">
<style>
  :root {
    --lava: #FF6262;
    --lava-glow: rgba(255,98,98,0.55);
    --good: #5FE39A;
    --glass-fill: rgba(255,255,255,0.06);
    --glass-stroke: rgba(255,255,255,0.12);
    --glass-hi: inset 0 1px 0 0 rgba(255,255,255,0.20), inset 0 0 0 1px rgba(255,255,255,0.05);
    --ease: cubic-bezier(0.2,0.8,0.2,1);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; min-height: 100vh; background: #050507; color: #fff;
    font-family: var(--vx-font-mono); overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  body::before {
    content: ""; position: fixed; inset: -14vh -14vw; z-index: 0;
    background:
      radial-gradient(38vw 38vw at 16% 14%, rgba(255,98,98,0.22), transparent 60%),
      radial-gradient(34vw 34vw at 84% 84%, rgba(0,210,255,0.12), transparent 62%),
      radial-gradient(30vw 30vw at 60% 104%, rgba(168,85,247,0.14), transparent 60%),
      #050507;
    filter: blur(52px);
  }

  /* stage / scaling */
  #root { position: relative; z-index: 1; }
  .x-fit { transform-origin: center center; }
  .x-stage { display: flex; gap: 60px; align-items: flex-start; justify-content: center; }
  .x-col { display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .x-coltag { display: flex; flex-direction: column; align-items: center; gap: 5px; text-align: center; }
  .x-coltag__name { font: 700 16px/1.25 var(--vx-font-sans); letter-spacing: -0.02em; color: #fff; white-space: nowrap; }
  .x-coltag__name b { color: var(--lava); }
  .x-coltag__desc { font: 400 12px/1.4 var(--vx-font-mono); color: rgba(255,255,255,0.5); max-width: 36ch; }

  /* ───────── SCREEN SHELL ───────── */
  .x-screen { position: relative; height: 100%; overflow: hidden; color: #fff; font-family: var(--vx-font-mono); }
  .x-screen::before {
    content: ""; position: absolute; inset: 0; z-index: 0;
    background:
      radial-gradient(74% 42% at 24% -2%, rgba(255,98,98,0.26), transparent 70%),
      radial-gradient(58% 34% at 98% 14%, rgba(168,85,247,0.14), transparent 70%),
      radial-gradient(96% 50% at 50% 104%, rgba(0,210,255,0.06), transparent 76%),
      #0a0a0c;
  }
  .x-scroll { position: absolute; inset: 0; z-index: 1; overflow-y: auto; scrollbar-width: none; padding: 0 0 40px; }
  .x-scroll::-webkit-scrollbar { display: none; }

  /* ───────── TOP CHROME (sticky) ───────── */
  .x-chrome { position: sticky; top: 0; z-index: 6; padding: 56px 14px 10px;
    display: flex; align-items: center; gap: 10px;
    background: linear-gradient(180deg, rgba(10,10,12,0.94) 58%, rgba(10,10,12,0));
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
  .x-chrome__btn { width: 38px; height: 38px; border-radius: 9999px; flex-shrink: 0; border: 0; cursor: pointer;
    display: flex; align-items: center; justify-content: center; color: #fff;
    background: rgba(120,120,128,0.26); border: 0.5px solid rgba(255,255,255,0.16);
    box-shadow: inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08);
    backdrop-filter: blur(12px) saturate(180%); -webkit-backdrop-filter: blur(12px) saturate(180%); }
  .x-chrome__btn:active { opacity: 0.8; }
  .x-chrome__title { flex: 1; text-align: center; font: 700 13px/1 var(--vx-font-sans); letter-spacing: -0.01em; color: rgba(255,255,255,0.82);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ───────── content padding ───────── */
  .x-pad { padding: 6px 16px 0; display: flex; flex-direction: column; gap: 14px; }
  .x-section { display: flex; align-items: center; gap: 8px; padding: 8px 2px 0; }
  .x-section__k { font: 700 10.5px/1 var(--vx-font-mono); letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.46); }
  .x-section__count { font: 600 10.5px/1 var(--vx-font-mono); color: rgba(255,255,255,0.34); }
  .x-section__line { flex: 1; height: 1px; background: rgba(255,255,255,0.07); }

  /* ───────── HERO ───────── */
  .x-bubble { border-radius: 9999px; display: inline-flex; align-items: center; justify-content: center;
    border: 1px solid rgba(255,255,255,0.12); box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.16); flex-shrink: 0; }
  .x-hero { display: flex; align-items: center; gap: 14px; padding: 4px 2px 2px; }
  .x-hero__name { font: 700 26px/1.05 var(--vx-font-sans); letter-spacing: -0.035em; color: #fff; }
  .x-hero__tags { display: flex; gap: 6px; margin-top: 8px; }
  .x-tag { font: 600 10.5px/1 var(--vx-font-mono); color: rgba(255,255,255,0.7); padding: 5px 9px; border-radius: 9999px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); }
  .x-hero__cat { font: 500 11px/1.3 var(--vx-font-mono); color: rgba(255,255,255,0.46); margin-top: 8px; }

  /* ───────── TABS ───────── */
  .x-tabs { position: relative; display: flex; padding: 3px; border-radius: 13px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
  .x-tabs__thumb { position: absolute; top: 3px; bottom: 3px; width: calc((100% - 6px) / 2); border-radius: 10px;
    background: rgba(255,255,255,0.10); border: 1px solid rgba(255,255,255,0.12);
    box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.14), 0 2px 8px rgba(0,0,0,0.3); transition: left .22s var(--ease); }
  .x-tabs__b { position: relative; z-index: 1; flex: 1; border: 0; background: transparent; cursor: pointer;
    padding: 9px 4px; font: 600 13px/1 var(--vx-font-sans); letter-spacing: -0.01em; color: rgba(255,255,255,0.5); transition: color .2s var(--ease); }
  .x-tabs__b.is-on { color: var(--lava); }

  /* ───────── GUÍA: animación ───────── */
  .x-anim { position: relative; height: 188px; border-radius: 22px; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--glass-stroke); box-shadow: var(--glass-hi); }
  .x-anim::before { content: ""; position: absolute; inset: 0;
    background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 26px 26px; mask-image: radial-gradient(70% 70% at 50% 45%, #000, transparent 78%);
    -webkit-mask-image: radial-gradient(70% 70% at 50% 45%, #000, transparent 78%); }
  .x-anim__bubble { position: relative; width: 84px; height: 84px; border-radius: 9999px; display: flex; align-items: center; justify-content: center;
    border: 1px solid rgba(255,255,255,0.14); }
  .x-anim__tag { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
    font: 600 10px/1 var(--vx-font-mono); letter-spacing: 0.04em; text-transform: uppercase; color: rgba(255,255,255,0.62);
    padding: 6px 11px; border-radius: 9999px; background: rgba(10,10,12,0.6);
    border: 1px solid rgba(255,255,255,0.12); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }

  /* ───────── GUÍA: card base ───────── */
  .x-card { padding: 16px; border-radius: 18px; background: var(--glass-fill); border: 1px solid var(--glass-stroke); box-shadow: var(--glass-hi); }
  .x-desc__chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .x-chip2 { font: 600 10.5px/1 var(--vx-font-mono); color: rgba(255,255,255,0.72); padding: 5px 9px; border-radius: 9999px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); }
  .x-chip2--cust { color: var(--vx-insight); background: var(--vx-insight-bg); border-color: rgba(168,85,247,0.3); }
  .x-desc__p { margin: 0; font: 400 13px/1.6 var(--vx-font-mono); color: rgba(255,255,255,0.82); text-wrap: pretty; }

  /* ───────── GUÍA: pasos ───────── */
  .x-steps { display: flex; flex-direction: column; gap: 0; padding: 6px 16px; }
  .x-step { display: flex; gap: 13px; align-items: flex-start; padding: 12px 0; }
  .x-step + .x-step { border-top: 1px solid rgba(255,255,255,0.07); }
  .x-step__n { flex-shrink: 0; width: 24px; height: 24px; border-radius: 9999px; display: flex; align-items: center; justify-content: center;
    font: 700 12px/1 var(--vx-font-sans); background: rgba(255,255,255,0.04); border: 1px solid currentColor; margin-top: 1px; }
  .x-step__t { font: 400 13px/1.5 var(--vx-font-mono); color: rgba(255,255,255,0.85); text-wrap: pretty; }

  /* ───────── empty progreso ───────── */
  .x-empty { padding: 40px 26px; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 9px;
    border-radius: 22px; background: var(--glass-fill); border: 1px solid var(--glass-stroke); box-shadow: var(--glass-hi); }
  .x-empty__iso { opacity: 0.85; margin-bottom: 3px; }
  .x-empty__t { font: 700 17px/1.1 var(--vx-font-sans); letter-spacing: -0.02em; color: #fff; }
  .x-empty__b { font: 400 12.5px/1.55 var(--vx-font-mono); color: rgba(255,255,255,0.6); max-width: 30ch; text-wrap: pretty; }

  /* ───────── CHART CARD ───────── */
  .x-chartcard { padding: 16px 16px 12px; border-radius: 22px; background: var(--glass-fill);
    backdrop-filter: blur(30px) saturate(150%); -webkit-backdrop-filter: blur(30px) saturate(150%);
    border: 1px solid var(--glass-stroke); box-shadow: var(--glass-hi), 0 12px 34px rgba(0,0,0,0.3); }
  .x-chartcard__head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .x-big { display: flex; flex-direction: column; gap: 7px; }
  .x-big__v { font: 700 38px/0.9 var(--vx-font-sans); letter-spacing: -0.04em; color: #fff; }
  .x-big__l { font: 600 9.5px/1 var(--vx-font-mono); letter-spacing: 0.06em; text-transform: uppercase; color: rgba(255,255,255,0.46); }
  .x-big__delta { display: inline-flex; align-items: center; gap: 4px; align-self: flex-start; margin-top: 2px;
    font: 700 11px/1 var(--vx-font-mono); color: var(--good); padding: 5px 8px; border-radius: 9999px;
    background: rgba(46,204,113,0.12); border: 1px solid rgba(46,204,113,0.24); }
  /* metric toggle */
  .x-mseg { display: flex; padding: 3px; border-radius: 11px; flex-shrink: 0;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); }
  .x-mseg__b { border: 0; background: transparent; cursor: pointer; padding: 7px 11px; border-radius: 8px;
    font: 600 11px/1 var(--vx-font-sans); letter-spacing: -0.01em; color: rgba(255,255,255,0.5); transition: all .18s var(--ease); }
  .x-mseg__b.is-on { color: #fff; background: rgba(255,255,255,0.12); box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.14); }
  .x-chart { margin-top: 12px; }
  .x-chart__svg { display: block; width: 100%; height: 152px; }

  /* ───────── KPI STRIP ───────── */
  .x-kpis { display: flex; padding: 14px 4px; border-radius: 18px;
    background: var(--glass-fill); border: 1px solid var(--glass-stroke); box-shadow: var(--glass-hi); }
  .x-kpi { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; position: relative; }
  .x-kpi + .x-kpi::before { content: ""; position: absolute; left: 0; top: 3px; bottom: 3px; width: 1px; background: rgba(255,255,255,0.08); }
  .x-kpi__v { font: 700 16px/1 var(--vx-font-sans); letter-spacing: -0.03em; color: #fff; display: inline-flex; align-items: center; gap: 4px; }
  .x-kpi__v--pr { color: var(--vx-neutral); }
  .x-kpi__l { font: 500 9px/1 var(--vx-font-mono); letter-spacing: 0.04em; text-transform: uppercase; color: rgba(255,255,255,0.46); }

  /* ───────── HISTORY ───────── */
  .x-hist { display: flex; flex-direction: column; gap: 8px; }
  .x-hrow { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 15px;
    background: var(--glass-fill); border: 1px solid var(--glass-stroke); box-shadow: var(--glass-hi); }
  .x-hrow__date { width: 58px; flex-shrink: 0; font: 600 11px/1.3 var(--vx-font-mono); color: rgba(255,255,255,0.5); }
  .x-hrow__body { flex: 1; min-width: 0; }
  .x-hrow__top { font: 600 14px/1.2 var(--vx-font-sans); letter-spacing: -0.01em; color: #fff; display: flex; align-items: center; gap: 7px; }
  .x-hrow__pr { display: inline-flex; align-items: center; gap: 3px; font: 700 8.5px/1 var(--vx-font-mono);
    color: var(--vx-neutral); padding: 3px 6px; border-radius: 9999px; background: var(--vx-neutral-bg); border: 1px solid rgba(255,185,0,0.3); }
  .x-hrow__meta { font: 500 10.5px/1 var(--vx-font-mono); color: rgba(255,255,255,0.46); margin-top: 5px; }
  .x-hrow__right { text-align: right; flex-shrink: 0; display: flex; flex-direction: column; gap: 4px; }
  .x-hrow__val { font: 700 14px/1 var(--vx-font-sans); letter-spacing: -0.02em; color: #fff; }
  .x-hrow__delta { font: 600 10.5px/1 var(--vx-font-mono); }
  .x-hrow__delta.is-up { color: var(--good); }
  .x-hrow__delta.is-down { color: var(--vx-health); }

  /* ───────── MUSCLES ───────── */
  .x-musc { padding: 16px; border-radius: 18px; background: var(--glass-fill); border: 1px solid var(--glass-stroke);
    box-shadow: var(--glass-hi); display: flex; flex-direction: column; gap: 14px; }
  .x-musc__top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 7px; }
  .x-musc__name { font: 600 12.5px/1 var(--vx-font-sans); color: #fff; }
  .x-musc__role { font: 500 10px/1 var(--vx-font-mono); letter-spacing: 0.03em; text-transform: uppercase; color: rgba(255,255,255,0.42); }
  .x-musc__bar { height: 6px; border-radius: 9999px; background: rgba(255,255,255,0.08); overflow: hidden; }
  .x-musc__bar span { display: block; height: 100%; border-radius: 9999px; }

  /* ───────── AGENT NOTE + EDIT ───────── */
  .x-agent { display: flex; gap: 12px; align-items: flex-start; padding: 14px 16px; border-radius: 18px;
    background: rgba(255,98,98,0.09); backdrop-filter: blur(20px) saturate(150%); -webkit-backdrop-filter: blur(20px) saturate(150%);
    border: 1px solid rgba(255,98,98,0.2); box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.07); }
  .x-agent__mark { flex-shrink: 0; margin-top: 1px; }
  .x-agent__from { font: 700 10.5px/1 var(--vx-font-sans); color: var(--lava); margin-bottom: 5px; }
  .x-agent__msg { font: 400 12.5px/1.5 var(--vx-font-mono); color: rgba(255,255,255,0.9); text-wrap: pretty; }

  .x-edit { width: 100%; display: flex; align-items: center; gap: 12px; padding: 13px 15px; border-radius: 16px; cursor: pointer;
    background: rgba(255,255,255,0.04); border: 1px dashed rgba(255,255,255,0.18); text-align: left;
    transition: background .15s var(--ease), border-color .15s var(--ease); }
  .x-edit:hover { background: rgba(255,98,98,0.07); border-color: rgba(255,98,98,0.3); }
  .x-edit:active { opacity: 0.85; }
  .x-edit__iso { flex-shrink: 0; }
  .x-edit__body { flex: 1; min-width: 0; }
  .x-edit__label { font: 600 13px/1.2 var(--vx-font-sans); color: #fff; }
  .x-edit__hint { font: 500 10.5px/1.3 var(--vx-font-mono); color: rgba(255,255,255,0.46); margin-top: 4px; }
  .x-edit__c { font: 700 18px/1 var(--vx-font-sans); color: var(--lava); flex-shrink: 0; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="nav.jsx"></script>
  <script type="text/babel" src="exercises-data.jsx"></script>
  <script type="text/babel" src="ejercicio-core.jsx"></script>

  <script type="text/babel">
    function EjercicioScreen({ t, onMetric, onTab }) {
      const model = buildEjercicio(t);
      const { ex, points, unit, metrica, tab, hasData, bigVal, bigLbl, bigDelta } = model;

      return (
        <div className="x-screen">
          <div className="x-scroll">
            <div className="x-chrome">
              <button className="x-chrome__btn" aria-label="Volver" onClick={() => vxNav(VX.ENTRENO, { segment: "ejercicios" })}><Icon.chevronLeft size={20} /></button>
              <div className="x-chrome__title">{ex.name}</div>
              <button className="x-chrome__btn" aria-label="Más"><XIcon.more size={20} /></button>
            </div>

            <div className="x-pad">
              <XHero model={model} />
              <XTabs tab={tab} onTab={onTab} />

              {tab === "progreso" ? (
                hasData ? (
                  <>
                    <div className="x-chartcard">
                      <div className="x-chartcard__head">
                        <div className="x-big">
                          <div className="x-big__v">{bigVal}</div>
                          <div className="x-big__l">{bigLbl}</div>
                          {bigDelta && <div className="x-big__delta"><XIcon.trendUp size={11} /> {bigDelta}{ex.since ? " · " + ex.since.replace("hace ", "") : ""}</div>}
                        </div>
                        <div className="x-mseg">
                          <button className={"x-mseg__b" + (metrica === "e1rm" ? " is-on" : "")} onClick={() => onMetric("e1rm")}>e1RM</button>
                          <button className={"x-mseg__b" + (metrica === "volumen" ? " is-on" : "")} onClick={() => onMetric("volumen")}>Volumen</button>
                        </div>
                      </div>
                      <div className="x-chart">
                        <ExChart points={points} unit={unit} color={ex.color} />
                      </div>
                    </div>

                    <XKpis ex={ex} />

                    <div className="x-section">
                      <span className="x-section__k">Historial</span>
                      <span className="x-section__count">últimas {ex.history.length} sesiones</span>
                      <span className="x-section__line" />
                    </div>
                    <div className="x-hist">
                      {ex.history.map((h, i) => <XHistRow key={i} h={h} metrica={metrica} />)}
                    </div>
                  </>
                ) : (
                  <XEmptyProgress ex={ex} />
                )
              ) : (
                <>
                  <XAnim ex={ex} />
                  <div className="x-section">
                    <span className="x-section__k">Descripción</span>
                    <span className="x-section__line" />
                  </div>
                  <XDesc ex={ex} />
                  <div className="x-section">
                    <span className="x-section__k">Ejecución</span>
                    <span className="x-section__count">{(ex.pasos || []).length} pasos</span>
                    <span className="x-section__line" />
                  </div>
                  <XSteps ex={ex} />
                  <div className="x-section">
                    <span className="x-section__k">Músculos trabajados</span>
                    <span className="x-section__line" />
                  </div>
                  <XMuscles ex={ex} />
                </>
              )}

              {ex.note && <XAgentNote msg={ex.note} />}
              <XAgentEdit />
            </div>
          </div>
        </div>
      );
    }

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "ejercicio": "press-banca",
      "metrica": "e1rm",
      "tab": "progreso"
    }/*EDITMODE-END*/;

    function Phone({ tag, desc, children }) {
      return (
        <div className="x-col">
          <div className="x-coltag">
            <div className="x-coltag__name" dangerouslySetInnerHTML={{ __html: tag }} />
            <div className="x-coltag__desc">{desc}</div>
          </div>
          <IOSDevice dark={true}>{children}</IOSDevice>
        </div>
      );
    }

    function App() {
      const [t, setTweak] = useTweaks({ ...TWEAK_DEFAULTS, ...vxReadParams(["ejercicio", "metrica", "tab"]) });
      return (
        <div>
          <div className="x-fit" id="fit">
            <div className="x-stage">
              <Phone tag="verxion · <b>Detalle de ejercicio</b>"
                desc="Toda la historia de un movimiento más su guía: progreso, cómo se hace y músculos.">
                <EjercicioScreen t={t} onMetric={(v) => setTweak("metrica", v)} onTab={(v) => setTweak("tab", v)} />
              </Phone>
            </div>
          </div>

          <TweaksPanel>
            <TweakSection label="Ejercicio" />
            <TweakSelect label="Cuál" value={t.ejercicio}
              options={(typeof VX_EXERCISES !== "undefined" ? VX_EXERCISES : []).map((e) => ({ value: e.slug, label: e.name }))}
              onChange={(v) => setTweak("ejercicio", v)} />
            <TweakSection label="Vista" />
            <TweakRadio label="Pestaña" value={t.tab}
              options={[{ value: "progreso", label: "Progreso" }, { value: "guia", label: "Cómo se hace" }]}
              onChange={(v) => setTweak("tab", v)} />
            <TweakRadio label="Métrica" value={t.metrica}
              options={[{ value: "e1rm", label: "e1RM" }, { value: "volumen", label: "Volumen" }]}
              onChange={(v) => setTweak("metrica", v)} />
          </TweaksPanel>
        </div>
      );
    }

    function fit() {
      const el = document.getElementById("fit");
      if (!el) return;
      const stage = el.querySelector(".x-stage");
      const w = stage.scrollWidth, h = stage.scrollHeight;
      const scale = Math.min(1, (window.innerWidth - 48) / w, (window.innerHeight - 40) / h);
      el.style.transform = "scale(" + scale + ")";
    }
    window.addEventListener("resize", fit);
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    setTimeout(fit, 80);
    setTimeout(fit, 400);
  </script>
</body>
</html>
