<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>verxion — Sesión en marcha</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="assets/colors_and_type.css">
<link rel="stylesheet" href="sesion.css">
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="nav.jsx"></script>
  <script type="text/babel" src="sesion-core.jsx"></script>
  <script type="text/babel" src="sesion-cierre.jsx"></script>

  <script type="text/babel">
    const { useEffect } = React;

    // ── full-screen live session viewer ──────────────────────────────────
    function SessionViewer({ t, onAction }) {
      const model = buildSession(t);
      const { paused, estado } = model;
      const showSheet = estado === "cierre";

      return (
        <div className={"s-screen" + (paused ? " is-paused" : "")}>
          {/* scroll body */}
          <div className="s-scroll">
            {/* top chrome (sticky) */}
            <div className="s-chrome">
              <button className="s-chrome__btn" aria-label="Minimizar" onClick={() => vxNav(VX.ENTRENO, { segment: "rutina", live: estado === "pausada" ? "paused" : "active", banner: true })}><SIcon.chevronDown size={20} /></button>
              <div className={"s-live" + (paused ? " is-paused" : "")}>
                <span className="s-live__dot" />
                <span className="s-live__lbl">{paused ? "Pausada" : "En vivo"}</span>
              </div>
              <button className="s-chrome__btn" aria-label="Más"><SIcon.more size={20} /></button>
            </div>

            <div className="s-pad">
              <SessHeader model={model} />
              <KpiStrip kpis={model.kpis} />

              <Section k="En curso" />
              <CurrentExercise model={model} />

              {model.pending.length > 0 && (
                <>
                  <Section k="A continuación" count={`${model.pending.length} ejercicios`} />
                  <div className="s-list">
                    {model.pending.map((ex, i) => (
                      <PendingRow key={ex.name} ex={ex} idx={model.progress.completedEx + 2 + i} />
                    ))}
                  </div>
                </>
              )}

              <Section k="Completados" count={`${model.done.length}`} />
              <div className="s-list">
                {model.done.map((ex, i) => <DoneRow key={ex.name} ex={ex} idx={i} />)}
              </div>
            </div>
          </div>

          {/* sticky action bar */}
          <div className="s-actions">
            <div className="s-actions__row">
              {paused ? (
                <>
                  <button className="s-btn s-btn--primary s-btn--full" onClick={() => onAction("activa")}>
                    <SIcon.play size={15} /> Reanudar
                  </button>
                  <button className="s-btn s-btn--ghost" onClick={() => onAction("cierre")}>Finalizar</button>
                </>
              ) : (
                <>
                  <button className="s-btn s-btn--ghost" onClick={() => onAction("pausada")}>
                    <SIcon.pause size={15} /> Pausar
                  </button>
                  <button className="s-btn s-btn--primary s-btn--full" onClick={() => onAction("cierre")}>
                    <SIcon.flag size={15} /> Finalizar sesión
                  </button>
                </>
              )}
            </div>
            <div className="s-actions__sync">
              {paused ? "Sesión en pausa · el tiempo no corre"
                      : <><span className="s-live__dot" /> Sincronizado en vivo con el agente</>}
            </div>
          </div>

          {/* cierre sheet */}
          {showSheet && <CloseSheet model={model} onDismiss={() => onAction("activa")} onFinish={() => vxNav(VX.ENTRENO, { segment: "sesiones" })} />}
        </div>
      );
    }

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "estado": "activa"
    }/*EDITMODE-END*/;

    function Phone({ tag, desc, children }) {
      return (
        <div className="s-col">
          <div className="s-coltag">
            <div className="s-coltag__name" dangerouslySetInnerHTML={{ __html: tag }} />
            <div className="s-coltag__desc">{desc}</div>
          </div>
          <IOSDevice dark={true}>{children}</IOSDevice>
        </div>
      );
    }

    const ESTADO_DESC = {
      activa: "El agente acaba de registrar la serie 2. La guía marca el objetivo de la siguiente: objetivo · RIR · última.",
      descanso: "Entre series. Cuenta atrás de descanso discreta, sin secuestrar la pantalla.",
      pausada: "Sesión en pausa: el cronómetro se congela y el ejercicio activo se atenúa.",
      completado: "El agente cerró Press militar con sobrecarga positiva. El foco avanza al siguiente.",
      ultima: "Última serie del ejercicio: tono finisher, vacía el tanque.",
      cierre: "Hoja de cierre: feedback cualitativo → \u201cgenerando\u201d → informe del entreno (API).",
    };

    function App() {
      const [t, setTweak] = useTweaks({ ...TWEAK_DEFAULTS, ...vxReadParams(["estado"]) });
      const onAction = (v) => setTweak("estado", v);

      return (
        <div>
          <div className="s-fit" id="fit">
            <div className="s-stage">
              <Phone tag="verxion · <b>Sesión en marcha</b>" desc={ESTADO_DESC[t.estado] || ESTADO_DESC.activa}>
                <SessionViewer t={t} onAction={onAction} />
              </Phone>
            </div>
          </div>

          <TweaksPanel>
            <TweakSection label="Estado de la sesión" />
            <TweakSelect label="Estado" value={t.estado}
              options={[
                { value: "activa", label: "Serie activa" },
                { value: "descanso", label: "Descanso entre series" },
                { value: "pausada", label: "Pausada" },
                { value: "completado", label: "Ejercicio completado" },
                { value: "ultima", label: "Última serie" },
                { value: "cierre", label: "Hoja de cierre" },
              ]}
              onChange={(v) => setTweak("estado", v)} />
          </TweaksPanel>
        </div>
      );
    }

    function fit() {
      const el = document.getElementById("fit");
      if (!el) return;
      const stage = el.querySelector(".s-stage");
      const w = stage.scrollWidth, h = stage.scrollHeight;
      const scale = Math.min(1, (window.innerWidth - 48) / w, (window.innerHeight - 40) / h);
      el.style.transform = "scale(" + scale + ")";
    }
    window.addEventListener("resize", fit);
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    setTimeout(fit, 80);
    setTimeout(fit, 400);
  </script>
</body>
</html>
