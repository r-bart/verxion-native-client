<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>verxion — Historial de sesiones</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="assets/colors_and_type.css">
<style>
  :root {
    --lava: #FF6262;
    --lava-glow: rgba(255,98,98,0.55);
    --good: var(--vx-up);
    --glass-fill: rgba(255,255,255,0.06);
    --glass-stroke: rgba(255,255,255,0.12);
    --glass-hi: inset 0 1px 0 0 rgba(255,255,255,0.20), inset 0 0 0 1px rgba(255,255,255,0.05);
    --ease: cubic-bezier(0.2,0.8,0.2,1);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; min-height: 100vh; background: #050507; color: #fff;
    font-family: var(--vx-font-mono); overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  body::before {
    content: ""; position: fixed; inset: -14vh -14vw; z-index: 0;
    background:
      radial-gradient(38vw 38vw at 16% 14%, rgba(255,98,98,0.22), transparent 60%),
      radial-gradient(34vw 34vw at 84% 84%, rgba(0,210,255,0.12), transparent 62%),
      radial-gradient(30vw 30vw at 60% 104%, rgba(155,89,182,0.14), transparent 60%),
      #050507;
    filter: blur(52px);
  }

  #root { position: relative; z-index: 1; }
  .sh-fit { transform-origin: center center; }
  .sh-stage { display: flex; gap: 60px; align-items: flex-start; justify-content: center; }
  .sh-colwrap { display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .sh-coltag { display: flex; flex-direction: column; align-items: center; gap: 5px; text-align: center; }
  .sh-coltag__name { font: 700 16px/1.25 var(--vx-font-sans); letter-spacing: -0.02em; color: #fff; white-space: nowrap; }
  .sh-coltag__name b { color: var(--lava); }
  .sh-coltag__desc { font: 400 12px/1.4 var(--vx-font-mono); color: rgba(255,255,255,0.5); max-width: 36ch; }

  /* ───────── SCREEN SHELL ───────── */
  .sh-screen { position: relative; height: 100%; overflow: hidden; color: #fff; font-family: var(--vx-font-mono); }
  .sh-screen::before {
    content: ""; position: absolute; inset: 0; z-index: 0;
    background:
      radial-gradient(74% 42% at 24% -2%, rgba(255,98,98,0.22), transparent 70%),
      radial-gradient(58% 34% at 98% 14%, rgba(155,89,182,0.13), transparent 70%),
      radial-gradient(96% 50% at 50% 104%, rgba(0,210,255,0.06), transparent 76%),
      #0a0a0c;
  }
  .sh-scroll { position: absolute; inset: 0; z-index: 1; overflow-y: auto; scrollbar-width: none; padding: 0 0 30px; }
  .sh-scroll::-webkit-scrollbar { display: none; }

  /* ───────── TOP CHROME ───────── */
  .sh-chrome { position: sticky; top: 0; z-index: 6; padding: 56px 14px 10px;
    display: flex; align-items: center; gap: 10px;
    background: linear-gradient(180deg, rgba(10,10,12,0.94) 58%, rgba(10,10,12,0));
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
  .sh-chrome__btn { width: 38px; height: 38px; border-radius: 9999px; flex-shrink: 0; border: 0; cursor: pointer;
    display: flex; align-items: center; justify-content: center; color: #fff;
    background: rgba(120,120,128,0.26); border: 0.5px solid rgba(255,255,255,0.16);
    box-shadow: inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08);
    backdrop-filter: blur(12px) saturate(180%); -webkit-backdrop-filter: blur(12px) saturate(180%); }
  .sh-chrome__btn:active { opacity: 0.8; }
  .sh-chrome__title { flex: 1; text-align: center; font: 700 14px/1 var(--vx-font-sans); letter-spacing: -0.01em; color: rgba(255,255,255,0.86);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sh-chrome__spacer { width: 38px; height: 38px; flex-shrink: 0; }

  /* ───────── content ───────── */
  .sh-pad { padding: 6px 16px 0; display: flex; flex-direction: column; gap: 12px; }
  .sh-lead { padding: 4px 2px 2px; }
  .sh-lead__count { font: 700 13px/1 var(--vx-font-sans); color: #fff; }
  .sh-lead__sub { font: 400 12px/1.5 var(--vx-font-mono); color: rgba(255,255,255,0.52); margin-top: 6px; }

  /* routine select */
  .sh-select { display: flex; align-items: center; gap: 9px; flex: 1; min-width: 0; cursor: pointer; text-align: left;
    padding: 12px 14px; border-radius: 14px; background: var(--glass-fill); border: 1px solid var(--glass-stroke); box-shadow: var(--glass-hi);
    transition: border-color .15s var(--ease); }
  .sh-select:hover { border-color: var(--vx-border-2); }
  .sh-select:active { opacity: 0.9; }
  .sh-select > svg:first-child { color: rgba(255,255,255,0.55); flex-shrink: 0; }
  .sh-select__v { flex: 1; min-width: 0; font: 600 13.5px/1 var(--vx-font-sans); letter-spacing: -0.01em; color: #fff;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* filter + sort bar */
  .sh-bar { display: flex; align-items: center; gap: 8px; }
  .sh-chips { display: flex; gap: 6px; flex: 1; min-width: 0; }
  .sh-chip { flex: 1; cursor: pointer; padding: 9px 6px; border-radius: 10px; font: 600 12px/1 var(--vx-font-sans); letter-spacing: -0.01em;
    color: rgba(255,255,255,0.62); background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    transition: all .14s var(--ease); }
  .sh-chip.is-on { color: var(--lava); background: var(--vx-lava-bg); border-color: rgba(255,98,98,0.36); }
  .sh-sortbtn { display: inline-flex; align-items: center; gap: 6px; cursor: pointer; flex-shrink: 0;
    padding: 9px 12px; border-radius: 10px; font: 600 12px/1 var(--vx-font-sans); letter-spacing: -0.01em; color: rgba(255,255,255,0.82);
    background: var(--glass-fill); border: 1px solid var(--glass-stroke); box-shadow: var(--glass-hi); }
  .sh-sortbtn svg { color: rgba(255,255,255,0.6); }

  /* block (routine) section header */
  .sh-block { display: flex; align-items: center; gap: 8px; padding: 12px 2px 2px; }
  .sh-block__name { font: 700 12.5px/1 var(--vx-font-sans); letter-spacing: -0.01em; color: #fff; white-space: nowrap; }
  .sh-block__state { font: 700 8px/1 var(--vx-font-mono); letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 6px; border-radius: 9999px; border: 1px solid; white-space: nowrap; }
  .sh-block__line { flex: 1; height: 1px; background: rgba(255,255,255,0.07); }
  .sh-block__meta { font: 500 10.5px/1 var(--vx-font-mono); color: rgba(255,255,255,0.42); white-space: nowrap; }
  .sh-sec { font: 600 11px/1 var(--vx-font-mono); letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.46); padding: 8px 2px 0; }

  /* rows */
  .sh-rows { display: flex; flex-direction: column; gap: 8px; }
  .sh-row { display: flex; align-items: center; gap: 11px; width: 100%; text-align: left; cursor: pointer;
    padding: 12px 14px; border-radius: 16px; background: var(--glass-fill); border: 1px solid var(--glass-stroke);
    box-shadow: var(--glass-hi); transition: border-color .15s var(--ease); }
  .sh-row:hover { border-color: var(--vx-border-2); }
  .sh-row:active { opacity: 0.9; }
  .sh-row__date { font: 600 11px/1.3 var(--vx-font-mono); color: rgba(255,255,255,0.5); width: 42px; flex-shrink: 0; }
  .sh-row__date em { display: block; font-style: normal; font-size: 9px; color: rgba(255,255,255,0.34); margin-top: 2px; }
  .sh-bubble { width: 34px; height: 34px; border-radius: 9999px; display: inline-flex; align-items: center; justify-content: center;
    border: 1px solid rgba(255,255,255,0.12); box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.16); flex-shrink: 0; }
  .sh-row__body { flex: 1; min-width: 0; }
  .sh-row__name { font: 600 13.5px/1.2 var(--vx-font-sans); color: #fff; display: flex; align-items: center; gap: 7px; }
  .sh-row__pr { display: inline-flex; align-items: center; gap: 3px; font: 700 8.5px/1 var(--vx-font-mono); letter-spacing: 0.04em;
    color: var(--vx-neutral); padding: 3px 6px; border-radius: 9999px; background: var(--vx-neutral-bg); border: 1px solid rgba(255,185,0,0.3); }
  .sh-row__bar { height: 5px; border-radius: 9999px; background: rgba(255,255,255,0.09); margin-top: 8px; overflow: hidden; }
  .sh-row__bar span { display: block; height: 100%; border-radius: 9999px; box-shadow: 0 0 8px currentColor; }
  .sh-row__meta { text-align: right; flex-shrink: 0; }
  .sh-row__vol { font: 700 13.5px/1 var(--vx-font-sans); letter-spacing: -0.02em; color: #fff; }
  .sh-row__dur { font: 500 10.5px/1 var(--vx-font-mono); color: rgba(255,255,255,0.46); margin-top: 4px; }

  .sh-empty { padding: 40px 24px; text-align: center; font: 400 12.5px/1.5 var(--vx-font-mono); color: rgba(255,255,255,0.5); }

  /* ───────── SORT SHEET ───────── */
  .sh-scrim { position: absolute; inset: 0; z-index: 40; display: flex; align-items: flex-end;
    background: rgba(8,8,10,0.62); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); }
  @media (prefers-reduced-motion: no-preference) { .sh-scrim { animation: sh-fade .18s var(--ease); } }
  @keyframes sh-fade { from { opacity: 0; } to { opacity: 1; } }
  .sh-sheet { width: 100%; display: flex; flex-direction: column; border-radius: 26px 26px 0 0;
    background: #131316; border: 1px solid var(--glass-stroke); border-bottom: 0;
    box-shadow: 0 -16px 50px rgba(0,0,0,0.5); padding: 0 0 calc(20px + env(safe-area-inset-bottom)); overflow: hidden; }
  @media (prefers-reduced-motion: no-preference) { .sh-sheet { animation: sh-up .26s var(--ease); } }
  @keyframes sh-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .sh-sheet__grab { width: 38px; height: 4px; border-radius: 9999px; background: rgba(255,255,255,0.22); margin: 10px auto 0; flex-shrink: 0; }
  .sh-sheet__head { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px 6px; }
  .sh-sheet__title { font: 700 17px/1 var(--vx-font-sans); letter-spacing: -0.02em; color: #fff; }
  .sh-sheet__close { width: 30px; height: 30px; border-radius: 9999px; border: 0; cursor: pointer; color: rgba(255,255,255,0.7);
    display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.08); }
  .sh-sortlist { display: flex; flex-direction: column; gap: 2px; padding: 4px 16px 6px; }
  .sh-sortrow { display: flex; align-items: center; justify-content: space-between; gap: 10px; cursor: pointer; text-align: left;
    border: 0; background: transparent; padding: 13px 6px; border-radius: 12px; width: 100%; }
  .sh-sortrow:hover { background: rgba(255,255,255,0.04); }
  .sh-sortrow__l { font: 600 14px/1.2 var(--vx-font-sans); color: #fff; }
  .sh-sortrow.is-on .sh-sortrow__l { color: var(--lava); }
  .sh-sortrow__h { font: 500 11px/1.2 var(--vx-font-mono); color: rgba(255,255,255,0.46); margin-top: 4px; }
  .sh-sortrow__c { color: var(--lava); flex-shrink: 0; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="nav.jsx"></script>
  <script type="text/babel" src="rutinas-data.jsx"></script>
  <script type="text/babel" src="sesiones-data.jsx"></script>
  <script type="text/babel" src="sesiones-historial-core.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "rutina": "all",
      "orden": "reciente"
    }/*EDITMODE-END*/;

    function Phone({ tag, desc, children }) {
      return (
        <div className="sh-colwrap">
          <div className="sh-coltag">
            <div className="sh-coltag__name" dangerouslySetInnerHTML={{ __html: tag }} />
            <div className="sh-coltag__desc">{desc}</div>
          </div>
          <IOSDevice dark={true}>{children}</IOSDevice>
        </div>
      );
    }

    function App() {
      const [t, setTweak] = useTweaks({ ...TWEAK_DEFAULTS, ...vxReadParams(["rutina", "orden"]) });
      return (
        <div>
          <div className="sh-fit" id="fit">
            <div className="sh-stage">
              <Phone tag="verxion · <b>Historial de sesiones</b>"
                desc="El log completo de entrenos, agrupado por bloque (rutina). Filtra por rutina y ordena por reciente, antiguo, volumen o duración.">
                <HistorialSesionesScreen t={t} key={t.rutina + t.orden} />
              </Phone>
            </div>
          </div>

          <TweaksPanel>
            <TweakSection label="Vista inicial" />
            <TweakSelect label="Rutina" value={t.rutina}
              options={[
                { value: "all", label: "Todas las rutinas" },
                { value: "ppl-hipertrofia", label: "PPL Hipertrofia" },
                { value: "ppl-base", label: "PPL base" },
                { value: "iniciacion-fullbody", label: "Iniciación full-body" },
              ]}
              onChange={(v) => setTweak("rutina", v)} />
            <TweakSelect label="Orden" value={t.orden}
              options={[
                { value: "reciente", label: "Más reciente" },
                { value: "antiguo", label: "Más antiguo" },
                { value: "volumen", label: "Volumen" },
                { value: "duracion", label: "Duración" },
              ]}
              onChange={(v) => setTweak("orden", v)} />
          </TweaksPanel>
        </div>
      );
    }

    function fit() {
      const el = document.getElementById("fit");
      if (!el) return;
      const stage = el.querySelector(".sh-stage");
      const w = stage.scrollWidth, h = stage.scrollHeight;
      const scale = Math.min(1, (window.innerWidth - 48) / w, (window.innerHeight - 40) / h);
      el.style.transform = "scale(" + scale + ")";
    }
    window.addEventListener("resize", fit);
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    setTimeout(fit, 80);
    setTimeout(fit, 400);
  </script>
</body>
</html>
