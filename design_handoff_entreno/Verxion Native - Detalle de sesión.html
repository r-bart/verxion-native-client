<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>verxion — Detalle de sesión</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="assets/colors_and_type.css">
<style>
  :root {
    --lava: #FF6262;
    --lava-glow: rgba(255,98,98,0.55);
    --good: var(--vx-up);
    --glass-fill: rgba(255,255,255,0.06);
    --glass-stroke: rgba(255,255,255,0.12);
    --glass-hi: inset 0 1px 0 0 rgba(255,255,255,0.20), inset 0 0 0 1px rgba(255,255,255,0.05);
    --ease: cubic-bezier(0.2,0.8,0.2,1);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; min-height: 100vh; background: #050507; color: #fff;
    font-family: var(--vx-font-mono); overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  body::before {
    content: ""; position: fixed; inset: -14vh -14vw; z-index: 0;
    background:
      radial-gradient(38vw 38vw at 16% 14%, rgba(255,98,98,0.22), transparent 60%),
      radial-gradient(34vw 34vw at 84% 84%, rgba(0,210,255,0.12), transparent 62%),
      radial-gradient(30vw 30vw at 60% 104%, rgba(155,89,182,0.14), transparent 60%),
      #050507;
    filter: blur(52px);
  }

  #root { position: relative; z-index: 1; }
  .sd-fit { transform-origin: center center; }
  .sd-stage { display: flex; gap: 60px; align-items: flex-start; justify-content: center; }
  .sd-colwrap { display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .sd-coltag { display: flex; flex-direction: column; align-items: center; gap: 5px; text-align: center; }
  .sd-coltag__name { font: 700 16px/1.25 var(--vx-font-sans); letter-spacing: -0.02em; color: #fff; white-space: nowrap; }
  .sd-coltag__name b { color: var(--lava); }
  .sd-coltag__desc { font: 400 12px/1.4 var(--vx-font-mono); color: rgba(255,255,255,0.5); max-width: 36ch; }

  /* ───────── SCREEN SHELL ───────── */
  .sd-screen { position: relative; height: 100%; overflow: hidden; color: #fff; font-family: var(--vx-font-mono); }
  .sd-screen::before {
    content: ""; position: absolute; inset: 0; z-index: 0;
    background:
      radial-gradient(74% 42% at 24% -2%, rgba(255,98,98,0.24), transparent 70%),
      radial-gradient(58% 34% at 98% 14%, rgba(155,89,182,0.14), transparent 70%),
      radial-gradient(96% 50% at 50% 104%, rgba(0,210,255,0.06), transparent 76%),
      #0a0a0c;
  }
  .sd-scroll { position: absolute; inset: 0; z-index: 1; overflow-y: auto; scrollbar-width: none; padding: 0 0 30px; }
  .sd-scroll::-webkit-scrollbar { display: none; }

  /* ───────── TOP CHROME ───────── */
  .sd-chrome { position: sticky; top: 0; z-index: 6; padding: 56px 14px 10px;
    display: flex; align-items: center; gap: 10px;
    background: linear-gradient(180deg, rgba(10,10,12,0.94) 58%, rgba(10,10,12,0));
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
  .sd-chrome__btn { width: 38px; height: 38px; border-radius: 9999px; flex-shrink: 0; border: 0; cursor: pointer;
    display: flex; align-items: center; justify-content: center; color: #fff;
    background: rgba(120,120,128,0.26); border: 0.5px solid rgba(255,255,255,0.16);
    box-shadow: inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08);
    backdrop-filter: blur(12px) saturate(180%); -webkit-backdrop-filter: blur(12px) saturate(180%); }
  .sd-chrome__btn:active { opacity: 0.8; }
  .sd-chrome__title { flex: 1; text-align: center; font: 700 14px/1 var(--vx-font-sans); letter-spacing: -0.01em; color: rgba(255,255,255,0.86); }

  /* ───────── content ───────── */
  .sd-pad { padding: 6px 16px 0; display: flex; flex-direction: column; gap: 14px; }
  .sd-sec { display: flex; align-items: center; gap: 8px; padding: 8px 2px 0; }
  .sd-sec__ic { color: rgba(255,255,255,0.5); display: inline-flex; }
  .sd-sec__k { font: 700 10.5px/1 var(--vx-font-mono); letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.56); white-space: nowrap; }
  .sd-sec__line { flex: 1; height: 1px; background: rgba(255,255,255,0.07); }

  .sd-eyebrow { display: inline-flex; align-items: center; gap: 5px; font: 700 9.5px/1 var(--vx-font-mono); letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap; }
  .sd-bubble { border-radius: 9999px; display: inline-flex; align-items: center; justify-content: center;
    border: 1px solid rgba(255,255,255,0.12); box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.16); flex-shrink: 0; }

  /* ───────── HERO ───────── */
  .sd-hero { padding: 18px; border-radius: 24px; background: var(--glass-fill);
    backdrop-filter: blur(30px) saturate(150%); -webkit-backdrop-filter: blur(30px) saturate(150%);
    border: 1px solid var(--glass-stroke); box-shadow: var(--glass-hi), 0 14px 38px rgba(0,0,0,0.32); }
  .sd-hero__top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .sd-hero__ctx { display: inline-flex; align-items: center; gap: 5px; font: 500 10.5px/1 var(--vx-font-mono); color: rgba(255,255,255,0.46); white-space: nowrap; }
  .sd-hero__ctx svg { color: rgba(255,255,255,0.4); }
  .sd-hero__row { display: flex; align-items: center; gap: 13px; margin-top: 14px; }
  .sd-hero__name { font: 700 27px/1.05 var(--vx-font-sans); letter-spacing: -0.035em; color: #fff; }
  .sd-hero__date { font: 500 12px/1.3 var(--vx-font-mono); color: rgba(255,255,255,0.58); margin-top: 5px; }
  .sd-hero__class { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; margin-top: 16px; }
  .sd-class { display: inline-flex; align-items: center; gap: 5px; font: 700 10px/1 var(--vx-font-mono); letter-spacing: 0.03em;
    padding: 5px 9px; border-radius: 9999px; border: 1px solid; }
  .sd-class__meta { font: 500 11px/1 var(--vx-font-mono); color: rgba(255,255,255,0.5); }
  .sd-prtag { display: inline-flex; align-items: center; gap: 4px; margin-left: auto; font: 700 10px/1 var(--vx-font-mono);
    color: var(--vx-neutral); padding: 5px 8px; border-radius: 9999px; background: var(--vx-neutral-bg); border: 1px solid rgba(255,185,0,0.3); }

  /* ───────── AGENT RECAP ───────── */
  .sd-recap { display: flex; gap: 12px; align-items: flex-start; padding: 14px 16px; border-radius: 18px;
    background: rgba(255,98,98,0.09); backdrop-filter: blur(20px) saturate(150%); -webkit-backdrop-filter: blur(20px) saturate(150%);
    border: 1px solid rgba(255,98,98,0.2); box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.07); }
  .sd-recap__mark { flex-shrink: 0; margin-top: 1px; }
  .sd-recap__from { font: 700 10.5px/1 var(--vx-font-sans); color: var(--lava); margin-bottom: 5px; }
  .sd-recap__msg { font: 400 12.5px/1.5 var(--vx-font-mono); color: rgba(255,255,255,0.9); text-wrap: pretty; }

  /* ───────── TILES ───────── */
  .sd-tiles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .sd-tile { padding: 13px 12px; border-radius: 16px; background: var(--glass-fill); border: 1px solid var(--glass-stroke);
    box-shadow: var(--glass-hi); display: flex; flex-direction: column; gap: 8px; }
  .sd-tile__bubble { width: 30px; height: 30px; border-radius: 9999px; display: flex; align-items: center; justify-content: center;
    border: 1px solid rgba(255,255,255,0.1); }
  .sd-tile__v { font: 700 19px/1 var(--vx-font-sans); letter-spacing: -0.03em; color: #fff; }
  .sd-tile__v em { font-style: normal; font-size: 11px; color: rgba(255,255,255,0.5); font-weight: 600; margin-left: 1px; }
  .sd-tile__l { font: 500 9.5px/1 var(--vx-font-mono); letter-spacing: 0.03em; text-transform: uppercase; color: rgba(255,255,255,0.46); }

  /* ───────── EXERCISE BREAKDOWN ───────── */
  .sd-exlist { display: flex; flex-direction: column; gap: 9px; }
  .sd-ex { display: block; width: 100%; text-align: left; cursor: pointer; padding: 13px 14px; border-radius: 16px;
    background: var(--glass-fill); border: 1px solid var(--glass-stroke); box-shadow: var(--glass-hi);
    transition: border-color .15s var(--ease); }
  .sd-ex:hover { border-color: var(--vx-border-2); }
  .sd-ex:active { opacity: 0.9; }
  .sd-ex.is-pr { border-color: rgba(255,185,0,0.3); }
  .sd-ex__head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .sd-ex__name { font: 600 14.5px/1.2 var(--vx-font-sans); letter-spacing: -0.01em; color: #fff; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
  .sd-ex__pr { display: inline-flex; align-items: center; gap: 3px; font: 700 8px/1 var(--vx-font-mono); letter-spacing: 0.05em; text-transform: uppercase;
    color: var(--vx-neutral); padding: 3px 6px; border-radius: 9999px; background: var(--vx-neutral-bg); border: 1px solid rgba(255,185,0,0.3); }
  .sd-ex__muscle { font: 500 10.5px/1.3 var(--vx-font-mono); color: rgba(255,255,255,0.5); margin-top: 5px; }
  .sd-ex__sets { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 11px; }
  .sd-set { display: inline-flex; align-items: center; gap: 4px; font: 600 11.5px/1 var(--vx-font-mono); color: rgba(255,255,255,0.86);
    padding: 5px 8px; border-radius: 9px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); white-space: nowrap; }
  .sd-set em { font-style: normal; font-size: 9px; color: rgba(255,255,255,0.4); font-weight: 700; }
  .sd-set.is-pr { background: var(--vx-neutral-bg); }

  /* ───────── ASSESS ───────── */
  .sd-assess { display: flex; gap: 8px; }
  .sd-assess__c { flex: 1; padding: 13px 10px; border-radius: 16px; background: var(--glass-fill); border: 1px solid var(--glass-stroke);
    box-shadow: var(--glass-hi); display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .sd-assess__v { font: 700 22px/1 var(--vx-font-sans); letter-spacing: -0.03em; }
  .sd-assess__v em { font-style: normal; font-size: 11px; color: rgba(255,255,255,0.4); font-weight: 600; }
  .sd-assess__l { font: 500 9.5px/1 var(--vx-font-mono); letter-spacing: 0.04em; text-transform: uppercase; color: rgba(255,255,255,0.5); }

  .sd-usernote { padding: 13px 15px; border-radius: 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.09); }
  .sd-usernote__k { font: 700 9.5px/1 var(--vx-font-mono); letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.42); margin-bottom: 7px; }
  .sd-usernote__t { font: 400 12.5px/1.5 var(--vx-font-mono); color: rgba(255,255,255,0.82); font-style: italic; text-wrap: pretty; }

  /* ───────── MUSCLES ───────── */
  .sd-musc { display: flex; flex-direction: column; gap: 11px; padding: 4px 2px 0; }
  .sd-musc__top { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 6px; }
  .sd-musc__name { font: 600 12.5px/1 var(--vx-font-sans); color: #fff; }
  .sd-musc__vol { font: 500 11px/1 var(--vx-font-mono); color: rgba(255,255,255,0.5); }
  .sd-musc__bar { height: 7px; border-radius: 9999px; background: rgba(255,255,255,0.08); overflow: hidden; }
  .sd-musc__bar span { display: block; height: 100%; border-radius: 9999px; background: var(--lava); box-shadow: 0 0 8px rgba(255,98,98,0.4); }

  /* ───────── ASK AGENT ───────── */
  .sd-ask { width: 100%; display: flex; align-items: center; gap: 12px; padding: 13px 15px; border-radius: 16px; cursor: pointer;
    margin-top: 6px; background: rgba(255,255,255,0.04); border: 1px dashed rgba(255,255,255,0.18); text-align: left;
    transition: background .15s var(--ease), border-color .15s var(--ease); }
  .sd-ask:hover { background: rgba(255,98,98,0.07); border-color: rgba(255,98,98,0.3); }
  .sd-ask:active { opacity: 0.85; }
  .sd-ask__iso { flex-shrink: 0; }
  .sd-ask__body { flex: 1; min-width: 0; }
  .sd-ask__label { font: 600 13px/1.25 var(--vx-font-sans); color: #fff; }
  .sd-ask__hint { font: 500 10.5px/1.45 var(--vx-font-mono); color: rgba(255,255,255,0.46); margin-top: 4px; text-wrap: pretty; }
  .sd-ask__c { font: 700 18px/1 var(--vx-font-sans); color: var(--lava); flex-shrink: 0; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="nav.jsx"></script>
  <script type="text/babel" src="rutinas-data.jsx"></script>
  <script type="text/babel" src="sesiones-data.jsx"></script>
  <script type="text/babel" src="sesion-detalle-core.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "sesion": "push-a-26may"
    }/*EDITMODE-END*/;

    function Phone({ tag, desc, children }) {
      return (
        <div className="sd-colwrap">
          <div className="sd-coltag">
            <div className="sd-coltag__name" dangerouslySetInnerHTML={{ __html: tag }} />
            <div className="sd-coltag__desc">{desc}</div>
          </div>
          <IOSDevice dark={true}>{children}</IOSDevice>
        </div>
      );
    }

    function App() {
      const [t, setTweak] = useTweaks({ ...TWEAK_DEFAULTS, ...vxReadParams(["sesion"]) });
      return (
        <div>
          <div className="sd-fit" id="fit">
            <div className="sd-stage">
              <Phone tag="verxion · <b>Detalle de sesión</b>"
                desc="El informe persistido de un entreno completado: stats, desglose por ejercicio (series reales), tu valoración y los grupos musculares. Solo lectura.">
                <SesionDetalleScreen t={t} />
              </Phone>
            </div>
          </div>

          <TweaksPanel>
            <TweakSection label="Sesión" />
            <TweakSelect label="Registro" value={t.sesion}
              options={[
                { value: "push-a-26may", label: "Push A · Lun 26 · 2 PR" },
                { value: "pull-a-27may", label: "Pull A · Mar 27" },
                { value: "legs-a-28may", label: "Legs A · Mié 28" },
                { value: "push-b-29may", label: "Push B · Jue 29 · 1 PR" },
                { value: "pull-b-30may", label: "Pull B · Vie 30" },
                { value: "legs-b-31may", label: "Legs B · Sáb 31 · 1 PR" },
              ]}
              onChange={(v) => setTweak("sesion", v)} />
          </TweaksPanel>
        </div>
      );
    }

    function fit() {
      const el = document.getElementById("fit");
      if (!el) return;
      const stage = el.querySelector(".sd-stage");
      const w = stage.scrollWidth, h = stage.scrollHeight;
      const scale = Math.min(1, (window.innerWidth - 48) / w, (window.innerHeight - 40) / h);
      el.style.transform = "scale(" + scale + ")";
    }
    window.addEventListener("resize", fit);
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    setTimeout(fit, 80);
    setTimeout(fit, 400);
  </script>
</body>
</html>
